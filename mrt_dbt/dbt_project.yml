
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'mrt_dbt'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'mrt_dbt'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models
# In this example config, we tell dbt to build all models in the example/
# directory as views. These settings can be overridden in the individual model
# files using the `{{ config(...) }}` macro.
models:
  mrt_dbt:
    staging:
      +materialized: view
      +schema: "stg"
      +persist_docs:
        relation: true
        columns: true
    marts:
      +materialized: table
      +schema: "mart"
      +persist_docs:
        relation: true
        columns: true

flags:
  source_freshness_run_project_hooks: True

data_tests:
  +store_failures: true
  +severity: warn

vars:
  start_date_kst: "2025-06-17"
  end_date_kst: "2025-06-18"
  logical_start_date_kst: "2025-06-18"
  logical_end_date_kst: "2025-06-19"
  today_kst: "2025-06-19"
  start_date_utc: "2025-06-16"
  end_date_utc: "2025-06-17"
  logical_start_date_utc: "2025-06-17"
  logical_end_date_utc: "2025-06-18"
  today_utc: "2025-06-18"
  before_hour_33: "2030-01-01" # 미사용
  before_7_days_kst: "2025-06-12"
  before_8_days_kst: "2025-06-11"
  before_30_days_kst: "2025-05-20"
  before_32_days_kst: "2025-05-18"
  before_one_year: "2024-06-18"
  struct_fields: "empty STRING"