version: 2

models:
  - name: INT_FPNA_PG_FEE
    description: |
      예약별 PG(결제대행사) 수수료율 정보.
      3.0 결제(order_payments + payments_completed)와 2.0 결제(mrt_20.payments)를 UNION하여
      예약별 PG사, 수수료율, 결제일을 산출한 뒤 FPNA_PG_INFO에서 PG사/기간별 수수료율 매핑.
      payments_completed는 client_type = 'ORDER'(주문 시스템)만 사용.
      FLIGHT(항공) 시스템과 ORDER_PAYMENT_ID 네임스페이스가 겹쳐 미필터 시 row explosion 발생.
      Grain: RESVE_ID (예약당 1행).
      Downstream: MART_FPNA_TNA_PROFIT_D, MART_FPNA_RENTALCAR_PROFIT_D,
                  MART_FPNA_PACKAGE_PROFIT_D, MART_FPNA_LODGMENT_PROFIT_D.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - RESVE_ID
          config:
            severity: warn
    columns:
      - name: RESVE_ID
        description: "예약 ID (reservation_no)"
        tests:
          - not_null:
              config:
                severity: warn
      - name: PG
        description: |
          PG사 식별자.
          TOSSPAYMENTS 해외카드는 'TOSSPAYMENTS_해외', KCP 해외카드는 'KCP_해외'로 분기.
          2.0 결제는 payments.payment_method를 그대로 사용.
        data_type: STRING
      - name: PG_COM_RATE
        description: |
          PG 수수료율. FPNA_PG_INFO(원천: external_business.FPNA_PG_INFO, 적재: edw_ext.FPNA_PG_INFO)에서
          PG사/유효기간 기준 매핑. PG 또는 유효기간 미매핑 시 NULL.
        data_type: FLOAT64
      - name: BASIS_DATE
        description: "결제 기준일. 3.0은 order_payments.created_at, 2.0은 payments.created_at_kst 기준."
        data_type: DATE
