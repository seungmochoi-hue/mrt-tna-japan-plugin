version: 2

models:
  - name: INT_PARTNER_AGG_ONSALE
    description: |
      파트너별 현재 판매 중 상품 수 집계 중간 모델.
      MART_PRODUCT_D에서 RECENT_STATUS = 'onsale'이고 MRT_TYPE이 rentalcar가 아닌 상품을
      파트너별로 집계하여 ONSALE_CNT를 산출.
      이 모델은 ONSALE_CNT 컬럼만 실제 값을 산출하고 나머지 지표 컬럼은 NULL로 출력.
      Grain: PARTNER_ID (파트너당 1행).
      Upstream: mrt_mart_view.MART_PRODUCT_D.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - PARTNER_ID
          config:
            severity: warn
    columns:
      - name: PARTNER_ID
        description: "파트너 ID (STRING으로 캐스팅된 PARTNER_ID)."
        data_type: STRING
        tests:
          - not_null:
              config:
                severity: warn
          - unique:
              config:
                severity: warn
      - name: RESVE_CNT
        description: "예약 수. 이 모델에서는 NULL로 출력 (INT_PARTNER_AGG_SALES에서 산출)."
        data_type: INT64
      - name: SALES_KRW_PRICE
        description: "누적 판매 금액(원). 이 모델에서는 NULL로 출력 (INT_PARTNER_AGG_SALES에서 산출)."
        data_type: INT64
      - name: USER_CNT
        description: "구매 유저 수. 이 모델에서는 NULL로 출력 (INT_PARTNER_AGG_SALES에서 산출)."
        data_type: INT64
      - name: CURRENT_RESVE_CNT
        description: "현재 여행 예정 예약 수. 이 모델에서는 NULL로 출력 (INT_PARTNER_AGG_SALES에서 산출)."
        data_type: INT64
      - name: ONSALE_CNT
        description: |
          파트너의 현재 판매 중 상품 수.
          계산식: COUNT(DISTINCT GID)
          조건: MART_PRODUCT_D에서 RECENT_STATUS = 'onsale' AND MRT_TYPE <> 'rentalcar'.
          rentalcar 유형은 집계에서 제외.
        data_type: INT64
      - name: MAIN_ACTIVITY_CITY_CD
        description: "대표 액티비티 도시 코드. 이 모델에서는 NULL로 출력 (INT_PARTNER_AGG_MAIN_ACTIVITY에서 산출)."
        data_type: STRING
      - name: MAIN_ACTIVITY_COUNTRY_NM
        description: "대표 액티비티 국가명. 이 모델에서는 NULL로 출력 (INT_PARTNER_AGG_MAIN_ACTIVITY에서 산출)."
        data_type: STRING
      - name: MAIN_ACTIVITY_MRT_TYPE
        description: "대표 액티비티 상품 유형. 이 모델에서는 NULL로 출력 (INT_PARTNER_AGG_MAIN_ACTIVITY에서 산출)."
        data_type: STRING
      - name: REVIEW_CNT
        description: "리뷰 수. 이 모델에서는 NULL로 출력 (INT_PARTNER_AGG_REVIEW에서 산출)."
        data_type: INT64
      - name: REVIEW_SCORE_AVG
        description: "평균 리뷰 점수. 이 모델에서는 NULL로 출력 (INT_PARTNER_AGG_REVIEW에서 산출)."
        data_type: FLOAT64
      - name: CONFIRM_RATE
        description: "파트너 예약 확정률. 이 모델에서는 NULL로 출력 (INT_PARTNER_AGG_CONFIRM_RATE에서 산출)."
        data_type: FLOAT64
