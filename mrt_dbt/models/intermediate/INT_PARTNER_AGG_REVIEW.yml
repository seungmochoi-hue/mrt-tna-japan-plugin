version: 2

models:
  - name: INT_PARTNER_AGG_REVIEW
    description: |
      파트너별 리뷰 수 및 평균 리뷰 점수 집계 중간 모델.
      2.0 리뷰(mrt_20.reviews + mrt_20.offers 조인, TravelerReview 타입)와
      3.0 리뷰(reviews.reviews + MART_PRODUCT_D 조인, rentalcar 제외)를 UNION하여
      파트너별 REVIEW_CNT와 REVIEW_SCORE_AVG를 산출.
      3.0 리뷰 ID는 2.0과 충돌 방지를 위해 ID + 1000000으로 처리.
      이 모델은 REVIEW_CNT, REVIEW_SCORE_AVG 컬럼만 실제 값을 산출하고 나머지 지표 컬럼은 NULL로 출력.
      Grain: PARTNER_ID (파트너당 1행).
      Upstream: mrt_20.reviews, mrt_20.offers, reviews.reviews, mrt_mart_view.MART_PRODUCT_D.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - PARTNER_ID
          config:
            severity: warn
    columns:
      - name: PARTNER_ID
        description: "파트너 ID (STRING으로 캐스팅된 PARTNER_ID)."
        data_type: STRING
        tests:
          - not_null:
              config:
                severity: warn
          - unique:
              config:
                severity: warn
      - name: RESVE_CNT
        description: "예약 수. 이 모델에서는 NULL로 출력 (INT_PARTNER_AGG_SALES에서 산출)."
        data_type: INT64
      - name: SALES_KRW_PRICE
        description: "누적 판매 금액(원). 이 모델에서는 NULL로 출력 (INT_PARTNER_AGG_SALES에서 산출)."
        data_type: INT64
      - name: USER_CNT
        description: "구매 유저 수. 이 모델에서는 NULL로 출력 (INT_PARTNER_AGG_SALES에서 산출)."
        data_type: INT64
      - name: CURRENT_RESVE_CNT
        description: "현재 여행 예정 예약 수. 이 모델에서는 NULL로 출력 (INT_PARTNER_AGG_SALES에서 산출)."
        data_type: INT64
      - name: ONSALE_CNT
        description: "판매 중 상품 수. 이 모델에서는 NULL로 출력 (INT_PARTNER_AGG_ONSALE에서 산출)."
        data_type: INT64
      - name: MAIN_ACTIVITY_CITY_CD
        description: "대표 액티비티 도시 코드. 이 모델에서는 NULL로 출력 (INT_PARTNER_AGG_MAIN_ACTIVITY에서 산출)."
        data_type: STRING
      - name: MAIN_ACTIVITY_COUNTRY_NM
        description: "대표 액티비티 국가명. 이 모델에서는 NULL로 출력 (INT_PARTNER_AGG_MAIN_ACTIVITY에서 산출)."
        data_type: STRING
      - name: MAIN_ACTIVITY_MRT_TYPE
        description: "대표 액티비티 상품 유형. 이 모델에서는 NULL로 출력 (INT_PARTNER_AGG_MAIN_ACTIVITY에서 산출)."
        data_type: STRING
      - name: REVIEW_CNT
        description: |
          파트너의 총 리뷰 수.
          계산식: COUNT(DISTINCT REVIEW_ID)
          2.0 리뷰: mrt_20.reviews (deleted_at IS NULL, type = 'TravelerReview') + offers 조인으로 guide_id(=PARTNER_ID) 매핑.
          3.0 리뷰: reviews.reviews + MART_PRODUCT_D 조인 (DOMAIN_NM = '3.0 PRODUCT', MRT_TYPE <> 'rentalcar').
          3.0 리뷰 ID는 ID + 1000000으로 2.0과 충돌 방지.
        data_type: INT64
      - name: REVIEW_SCORE_AVG
        description: |
          파트너의 평균 리뷰 점수.
          계산식: FLOOR(AVG(SCORE) * 100) / 100
          2.0 + 3.0 리뷰를 UNION한 전체 행 기준 평균.
          소수점 2자리로 내림 처리.
        data_type: FLOAT64
      - name: CONFIRM_RATE
        description: "파트너 예약 확정률. 이 모델에서는 NULL로 출력 (INT_PARTNER_AGG_CONFIRM_RATE에서 산출)."
        data_type: FLOAT64
