version: 2

models:
  - name: INT_SALE_BASE_D
    description: |
      도메인별 매출 원본 모델을 예약 기준 공통 스키마로 통합한 매출 베이스 테이블.
      `MART_SALE_D`, `DIM_CROSS_SELL`, `DIM_RESVE_TYPE`의 공통 upstream 입력으로 사용한다.
      Grain: `RESVE_ID` + `KIND`.
    config:
      tags: ["INT", "SALE"]
    columns:
      - name: BASIS_DATE
        description: "기준 일자"
        data_type: DATE

      - name: RESVE_ID
        description: "예약 아이디"
        data_type: STRING

      - name: ORDER_ID
        description: "주문 아이디"
        data_type: STRING

      - name: ORDER_NO
        description: "주문 번호"
        data_type: STRING

      - name: USER_ID
        description: "유저 아이디"
        data_type: STRING

      - name: KIND
        description: "예약 종류"
        data_type: INTEGER

      - name: RECENT_STATUS
        description: "최근 상태"
        data_type: STRING

      - name: CANCEL_KST_DT
        description: "취소 KST 일시"
        data_type: TIMESTAMP

      - name: DOMAIN_NM
        description: "도메인 명"
        data_type: STRING

      - name: PRODUCT_ID
        description: "상품 아이디"
        data_type: STRING

      - name: GID
        description: "GID"
        data_type: STRING

      - name: GPID
        description: "GPID"
        data_type: STRING

      - name: CONFIRM_KST_DT
        description: "확정 KST 일시"
