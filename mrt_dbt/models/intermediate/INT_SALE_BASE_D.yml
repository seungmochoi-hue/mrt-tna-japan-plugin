      - name: RESVE_TYPE
        description: "예약 유형"
        data_type: STRING

      - name: ORDER_RESVE_TYPE
        description: "주문 예약 유형"
        data_type: STRING

      - name: SALE_FORM_CD
        description: "판매 형태 코드"
        data_type: STRING

      - name: SALE_FORM_TYPE
        description: "판매 형태 타입"
