version: 2

models:
  - name: INT_SALE_ORIGINAL_HOTEL_SALE
    description: |
      호텔(Hotel) 판매 원천 데이터를 통합 판매 스키마로 변환한 중간 모델.
      MART_HOTEL_SALE_D(source)를 기반으로 표준 카테고리 코드를 JOIN하여 통합 스키마에 매핑.
      RESVE_ID는 'h' prefix를 붙여 호텔 도메인 식별.
      도메인 고정값: DOMAIN_NM='HOTEL', PRODUCT_ID='100000002', GID='1000007'.
      Upstream: MART_HOTEL_SALE_D(source), union_product_v3(source), dim_standard_category(source).
      Downstream: 통합 판매 마트 계열 모델.
    columns:
      - name: BASIS_DATE
        description: "기준일자 (MART_HOTEL_SALE_D.BASIS_DATE)."
        data_type: DATE
        tests:
          - not_null:
              config:
                severity: warn
      - name: RESVE_ID
        description: |
          예약 고유 식별자.
          RESVE_ID 앞에 'h' prefix를 붙여 호텔 도메인을 식별: CONCAT('h', RESVE_ID).
        data_type: STRING
        tests:
          - not_null:
              config:
                severity: warn
      - name: ORDER_ID
        description: |
          주문 식별자.
          RESVE_ID와 동일값: CONCAT('h', RESVE_ID).
        data_type: STRING
      - name: ORDER_NO
        description: "주문 번호. Hotel 미사용 (NULL 고정)."
        data_type: STRING
      - name: USER_ID
        description: "사용자 ID (MART_HOTEL_SALE_D.USER_ID)."
        data_type: STRING
      - name: KIND
        description: "예약 구분 코드 (MART_HOTEL_SALE_D.KIND)."
        data_type: STRING
        tests:
          - not_null:
              config:
                severity: warn
      - name: RECENT_STATUS
        description: "최신 예약 상태 (MART_HOTEL_SALE_D.RECENT_STATUS)."
        data_type: STRING
      - name: CANCEL_KST_DT
        description: "취소 일시 (KST). MART_HOTEL_SALE_D.CANCEL_KST_DT."
        data_type: TIMESTAMP
      - name: DOMAIN_NM
        description: "도메인명 고정값 ('HOTEL')."
        data_type: STRING
      - name: PRODUCT_ID
        description: "상품 ID 고정값 ('100000002')."
        data_type: STRING
      - name: GID
        description: "상품 그룹 ID 고정값 ('1000007')."
        data_type: STRING
      - name: GPID
        description: "상품 그룹 부모 ID. Hotel 미사용 (NULL 고정)."
        data_type: STRING
      - name: CONFIRM_KST_DT
        description: "예약 확정 일시 (KST). MART_HOTEL_SALE_D.RESVE_KST_DT."
        data_type: TIMESTAMP
      - name: TRAVEL_START_KST_DATE
        description: "여행 시작일 (체크인 날짜). MART_HOTEL_SALE_D.CHECK_IN_KST_DATE."
        data_type: DATE
      - name: TRAVEL_END_KST_DATE
        description: "여행 종료일 (체크아웃 날짜). MART_HOTEL_SALE_D.CHECK_OUT_KST_DATE."
        data_type: DATE
      - name: RESVE_TYPE
        description: "예약 유형 고정값 ('hotel')."
        data_type: STRING
      - name: ORDER_RESVE_TYPE
        description: "주문 예약 유형. Hotel 미사용 (NULL 고정)."
        data_type: STRING
      - name: SALE_FORM_CD
        description: "판매 형태 코드. Hotel 미사용 (NULL 고정)."
        data_type: STRING
      - name: SALE_FORM_TYPE
        description: "판매 형태 유형. Hotel 미사용 (NULL 고정)."
        data_type: STRING
      - name: SALE_AGG_TYPE
        description: "판매 집계 유형. Hotel 미사용 (NULL 고정)."
        data_type: STRING
      - name: BRANCH_CD
        description: "지점 코드. Hotel 미사용 (NULL 고정)."
        data_type: STRING
      - name: PARTNER_ID
        description: "파트너 ID (MART_HOTEL_SALE_D.OTA_ID)."
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_1_CD
        description: "표준 카테고리 1단계 코드. union_product_v3(id=1000007)를 통해 dim_standard_category에서 조회한 LV_1_CD."
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_2_CD
        description: "표준 카테고리 2단계 코드. union_product_v3(id=1000007)를 통해 dim_standard_category에서 조회한 LV_2_CD."
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_3_CD
        description: "표준 카테고리 3단계 코드. union_product_v3(id=1000007)를 통해 dim_standard_category에서 조회한 LV_3_CD."
        data_type: STRING
      - name: PAYMENT_LATER_FLAG
        description: "후불 결제 여부 플래그. Hotel 미사용 (NULL 고정)."
        data_type: STRING
      - name: PAYMENT_LIMIT_KST_DT
        description: "결제 기한 일시 (KST). Hotel 미사용 (NULL 고정)."
        data_type: TIMESTAMP
      - name: PARTNERSHIP_CD
        description: "제휴 코드. Hotel 미사용 (NULL 고정)."
        data_type: STRING
      - name: PARTNERSHIP_TYPE
        description: "제휴 유형. Hotel 미사용 (NULL 고정)."
        data_type: STRING
      - name: MARKETING_PARTNERSHIP_CD
        description: "마케팅 제휴 코드. Hotel 미사용 (NULL 고정)."
        data_type: STRING
      - name: MARKETING_LINK_ID
        description: "마케팅 링크 ID. Hotel 미사용 (NULL 고정)."
        data_type: STRING
      - name: PARTNERSHIP_PARTNER_ID
        description: "제휴 파트너 ID. Hotel 미사용 (NULL 고정)."
        data_type: STRING
      - name: PROVIDER_CD
        description: "공급사 코드. Hotel 미사용 (NULL 고정)."
        data_type: STRING
      - name: CITY_CD
        description: "도시 코드 (MART_HOTEL_SALE_D.RESVE_CITY_NM). 공항 코드 대신 도시명을 사용."
        data_type: STRING
      - name: CITY_REPRESENTATIVE_FLAG
        description: "대표 도시 여부 플래그. Hotel 미사용 (NULL 고정)."
        data_type: STRING
      - name: PG_NM
        description: "PG사명. Hotel 미사용 (NULL 고정)."
        data_type: STRING
      - name: RESVE_PAID_KST_DT
        description: "예약 및 결제 일시 (KST). MART_HOTEL_SALE_D.RESVE_KST_DT."
        data_type: TIMESTAMP
      - name: SALES_PRICE
        description: "판매 원가 (MART_HOTEL_SALE_D.SALES_PRICE)."
        data_type: FLOAT64
      - name: SALES_PRICE_CUR_TYPE
        description: "판매 원가 통화 유형 (MART_HOTEL_SALE_D.SALES_PRICE_CUR_TYPE)."
        data_type: STRING
      - name: SALES_KRW_PRICE
        description: "판매 금액 (KRW). MART_HOTEL_SALE_D.SALES_KRW_PRICE."
        data_type: FLOAT64
      - name: PAID_PRICE
        description: "실결제 금액. MART_HOTEL_SALE_D.SALES_PRICE와 동일값."
        data_type: FLOAT64
      - name: PAID_PRICE_CUR_TYPE
        description: "실결제 금액 통화 유형. MART_HOTEL_SALE_D.SALES_PRICE_CUR_TYPE와 동일값."
        data_type: STRING
      - name: PAID_KRW_PRICE
        description: "실결제 금액 (KRW). MART_HOTEL_SALE_D.SALES_KRW_PRICE와 동일값."
        data_type: FLOAT64
      - name: COUPON_PRICE
        description: "쿠폰 할인 금액. Hotel 미사용 (0 고정)."
        data_type: INT64
      - name: POINT_PRICE
        description: "포인트 사용 금액. Hotel 미사용 (0 고정)."
        data_type: INT64
      - name: DISCOUNT_PRICE
        description: "할인 금액. Hotel 미사용 (0 고정)."
        data_type: INT64
      - name: COMMISSION_PRICE
        description: "커미션 금액. Hotel 미사용 (NULL 고정)."
        data_type: FLOAT64
      - name: COMMISSION_RATE
        description: "커미션 율. Hotel 미사용 (NULL 고정)."
        data_type: FLOAT64
      - name: SETTLEMENT_COMMISSION_PRICE
        description: "정산 커미션 금액. Hotel 미사용 (NULL 고정)."
        data_type: FLOAT64
      - name: SETTLEMENT_COMMISSION_RATE
        description: "정산 커미션 율. Hotel 미사용 (NULL 고정)."
        data_type: FLOAT64
      - name: RESVE_PURPOSE_TYPE
        description: "예약 목적 유형. Hotel 미사용 (NULL 고정)."
        data_type: STRING
      - name: CHILD_RESVE_PRSNL_CNT
        description: "소아 예약 인원수. Hotel 미사용 (NULL 고정)."
        data_type: INT64
      - name: ADULT_RESVE_PRSNL_CNT
        description: "성인 예약 인원수. Hotel 미사용 (NULL 고정)."
        data_type: INT64
      - name: RESVE_PRSNL_CNT
        description: "총 예약 인원수. Hotel 미사용 (NULL 고정)."
        data_type: INT64
      - name: PLATFORM
        description: "결제 플랫폼 (MART_HOTEL_SALE_D.PLATFORM)."
        data_type: STRING
      - name: CREATE_KST_DT
        description: "생성 일시 (KST). MART_HOTEL_SALE_D.RESVE_KST_DT."
        data_type: TIMESTAMP
      - name: UPDATE_KST_DT
        description: "최종 수정 일시 (KST). MART_HOTEL_SALE_D.RESVE_KST_DT."
        data_type: TIMESTAMP
      - name: PACKAGE_PNR_NO
        description: "패키지 PNR 번호. Hotel 미사용 (NULL 고정)."
        data_type: INT64
