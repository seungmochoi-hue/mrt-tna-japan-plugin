      - name: B2B_POINT_FLAG
        description: "B2B 포인트 여부 (Y/N). BIZ_TYPE_V2가 'B2B_AFFILIATE_POINT%'이면 'Y'."
        data_type: STRING
      - name: B2B_AGENCY_FLAG
        description: "B2B 제휴여행사 여부 (Y/N). BIZ_TYPE_V2가 'B2B_AGENCY%'이면 'Y'."
        data_type: STRING
      - name: MARKETING_PARTNER_FLAG
        description: "마케팅 파트너 여부 (Y/N). MARKETING_PARTNERSHIP_CD가 존재하면 'Y'."
        data_type: STRING
      - name: ORDER_ID
        description: "주문 ID"
        data_type: STRING
      - name: ORDER_NO
        description: "주문 번호"
        data_type: STRING
      - name: RESVE_ID
        description: "예약 ID"
        data_type: STRING
      - name: RECENT_STATUS
        description: "최근 상태"
        data_type: STRING
      - name: RESVE_PRSNL_CNT
        description: "예약 인원. PACKAGE는 reservation_travelers 기준, 누락 시 option_reservations fallback"
        data_type: INTEGER
      - name: CROSS_SELL_FLAG
        description: "크로스 셀 여부"
        data_type: STRING
      - name: COUPON_ID
        description: "도메인 대표 쿠폰 ID. 도메인 mart 우선순위 결과 전달"
        data_type: INTEGER
      - name: PRODUCT_COUPON_ID
        description: "상품쿠폰 대표 템플릿 ID. 보험 도메인은 NULL 가능"
        data_type: INTEGER
      - name: ORDER_COUPON_ID
        description: "주문쿠폰 대표 템플릿 ID. 보험 도메인은 NULL 가능"
        data_type: INTEGER
      - name: COUPON_TITLE
        description: "쿠폰 제목"
        data_type: STRING
      - name: PG_NM
        description: "PG 이름"
        data_type: STRING
      - name: FLIGHT_RESVE_ID
        description: "항공 예약 ID"
        data_type: STRING
      - name: FLIGHT_CREATE_KST_DT
        description: "항공 생성 KST 일시"
        data_type: TIMESTAMP
      - name: FLIGHT_TRAVEL_START_KST_DATE
        description: "항공 여행 시작 KST 날짜"
        data_type: DATE
      - name: TRAVEL_ID
        description: "여행 ID"
        data_type: STRING
      - name: TRAVEL_DETAIL_ID
        description: "여행 상세 ID"
        data_type: INTEGER
      - name: ACCOUNTING_PROJECT_CODE
        description: "회계 프로젝트 코드"
        data_type: STRING
      - name: PARTNERSHIP_CD
        description: "파트너십 코드"
        data_type: STRING
      - name: MARKETING_PARTNERSHIP_CD
        description: "마케팅 파트너십 코드"
        data_type: STRING
      - name: PARTNERSHIP_TYPE
        description: "파트너십 유형"
        data_type: STRING
      - name: USER_ID
        description: "사용자 ID"
        data_type: STRING
      - name: MRT_STAFF_FLAG
        description: "MRT 직원 여부"
        data_type: BOOLEAN
      - name: GMV
        description: "고객 결제 금액 (Gross Merchandise Value). KIND=1 `SALES_KRW_PRICE` 기반, 양수로 적재."
        data_type: FLOAT
      - name: MRT_SALES_PRICE
        description: |
          마이리얼트립 수수료 매출 (VAT 제외).
          각 도메인별 Profit 모델(LODGMENT/RENTALCAR/TNA/PACKAGE/INSURANCE)에서 산출된 MRT_SALES_PRICE를 매크로(fpna_nonair_profit_domain_select)를 통해 패스스루.
          산출 로직은 도메인별로 상이하며, 각 도메인 모델에서 수수료율/NET_PRICE 기반으로 계산된 결과이다.
        data_type: FLOAT
      - name: COUPON_PRICE
        description: |
          결제 쿠폰 금액(Closing 우선, MRT 쿠폰 기준).
          Closing 결제 건의 MRT_COUPON_DISCOUNT_AMOUNT 합산을 우선 사용하며, 미매핑 시 기존 도메인별 값으로 폴백.
        data_type: INTEGER
      - name: PRODUCT_COUPON_PRICE
        description: "상품쿠폰 비용 금액(MRT 부담분). 도메인 profit mart split 값"
        data_type: INTEGER
      - name: ORDER_COUPON_PRICE
        description: "주문쿠폰 비용 금액(MRT 부담분). 도메인 profit mart split 값"
        data_type: INTEGER
      - name: POINT_PRICE
        description: |
          결제 포인트 금액(Closing 우선).
          Closing 결제 건의 FREE_POINT_AMOUNT 합산을 우선 사용하며, 미매핑 시 기존 도메인별 값으로 폴백.
        data_type: INTEGER
      - name: EXCLUDED_POINT_PRICE
        description: |
          비용에서 제외할 포인트 금액(Closing 우선).
          Closing 결제 건 중 INT_FPNA_POINT_DETAIL.POINT_SUM 존재 예약(FPNA_EXCEPTED_POINT_INFO 대상)의 FREE_POINT_AMOUNT 합산을 우선 사용하며, 미매핑 시 기존 값으로 폴백.
        data_type: INTEGER
      - name: DISCOUNT_PRICE
        description: |
          결제 할인 금액(Closing 우선, VAT 제외).
          Closing 결제 건의 (MRT_INSTANT_DISCOUNT_AMOUNT + MARGIN_DISCOUNT_AMOUNT + AFFILIATE_INSTANT_DISCOUNT_AMOUNT) / 1.1 합산을 우선 사용하며, 미매핑 시 기존 값으로 폴백.
        data_type: FLOAT
      - name: MARKETING_PARTNER_FEE
        description: "마케팅 파트너 수수료(결제분). Closing 결제 건 MARKETING_PARTNERSHIP_COMMISSION 우선, 미매핑 시 기존 값 폴백."
        data_type: INTEGER
      - name: AGENCY_FEE
        description: "제휴여행사 수수료(결제분). Closing 결제 건 PARTNERSHIP_COMMISSION 우선, 미매핑 시 기존 값 폴백."
        data_type: INTEGER
      - name: AFFILIATE_POINT_FEE
        description: "B2B 제휴 포인트 수수료(결제분). Closing 결제 건 기준 B2B 포인트 예약에 FREE_POINT_AMOUNT * 0.02를 우선 적용, 미매핑 시 기존 값 폴백."
        data_type: FLOAT
      - name: CHANNEL_FEE_PRICE
        description: |
          결제 PG 수수료 금액(fee, Closing 우선). PG_AMOUNT(PG 결제액, CGMV 구성요소)와 구분되는 개념.
          Closing 결제 건 PAYMENT_PG_AMOUNT * PG_COM_RATE(수수료율, 약 2~3%) 기반 산출을 우선 사용하며, 미매핑 시 기존 값으로 폴백.
        data_type: FLOAT
      - name: CPD_AMOUNT
        description: |
          CPD(Coupon/Point/Discount) 금액. 쿠폰/포인트/할인 합계.
          계산식: COUPON_PRICE + POINT_PRICE - EXCLUDED_POINT_PRICE + DISCOUNT_PRICE
        data_type: FLOAT
      - name: CHANNEL_FEE_AMOUNT
        description: |
          채널 수수료 합계 금액.
          계산식: CHANNEL_FEE_PRICE + AGENCY_FEE + MARKETING_PARTNER_FEE + AFFILIATE_POINT_FEE
        data_type: FLOAT
      - name: CON_MARGIN
        description: |
          공헌이익(Contribution Margin).
          계산식: REVENUE - CPD_AMOUNT - CHANNEL_FEE_AMOUNT
          - REVENUE = Closing PAYMENT_REVENUE / 1.1 우선, 미매칭 시 기존 로직 폴백 (PAYMENT_REVENUE = SALE_COMMISSION + MRT_CANCEL_COMMISSION)
          - CPD_AMOUNT = COUPON_PRICE + POINT_PRICE - EXCLUDED_POINT_PRICE + DISCOUNT_PRICE
          - CHANNEL_FEE_AMOUNT = CHANNEL_FEE_PRICE + AGENCY_FEE + MARKETING_PARTNER_FEE + AFFILIATE_POINT_FEE
        data_type: FLOAT
      - name: COMMISSION_RATE
        description: "커미션 비율. 각 도메인별 Profit 모델에서 산출된 값을 패스스루."
        data_type: FLOAT
      - name: NET_PRICE
        description: "공급가 (파트너에게 지급하는 금액). TNA 도메인만 값 존재, 나머지 도메인은 NULL."
        data_type: FLOAT
      - name: DW_LOAD_DT
        description: "DW 적재 일시"
        data_type: TIMESTAMP
      - name: REVENUE
        description: |
          Revenue (VAT 제외). Closing PAYMENT_REVENUE 우선, 미매칭 시 기존 로직 폴백.
          - Closing 매칭 건: (SALE_COMMISSION + MRT_CANCEL_COMMISSION) / 1.1
          - 폴백(사입): GMV / 1.1, 폴백(위탁): MRT_SALES_PRICE
          매관 비교 시 view에서 REVENUE * 1.1로 VAT 포함 금액 산출.
        data_type: FLOAT
      - name: MRT_POINT_NET_AMOUNT
        description: "포인트 순액. 계산식: POINT_PRICE - EXCLUDED_POINT_PRICE. NONAIR_PROFIT_D에서 직접 산출."
        data_type: FLOAT
