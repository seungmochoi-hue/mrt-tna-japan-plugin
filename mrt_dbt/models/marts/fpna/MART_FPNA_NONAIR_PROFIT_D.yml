version: 2

models:
  - name: MART_FPNA_NONAIR_PROFIT_D
    description: |
      FPNA 비항공 수익/비용/지표 산출 일 단위 MART.
      숙박/렌터카/T&A/패키지/보험 profit mart 통합, grain은 주문/예약 단위.

      `RECENT_STATUS='cancel' AND CONFIRM_KST_DATE IS NULL`인 확정 전 취소 건은 `MART_FPNA_CONFIRMATION_CLOSING_D.BASIS_DATE`로 `CONFIRM_KST_DATE` 보정해 이벤트형 월 집계 누락 방지.
      `REVENUE`는 Closing 결제 Revenue(`/1.1`) 우선, 미매칭 시 `PARTNER_SALES_TYPE='total'`이면 `GMV / 1.1`, 그 외는 `MRT_SALES_PRICE` 사용.
      `MRT_POINT_NET_AMOUNT = POINT_PRICE - EXCLUDED_POINT_PRICE`, 공헌이익은 `REVENUE - (COUPON + POINT_NET + DISCOUNT) - (PG_FEE + MARKETING + AGENCY + AFFILIATE)` 구조.
      `FPNA_TYPE_LV_1='마이팩'`은 패키지 판매 파트너 기준 집계라 개별 구성상품 공급 파트너와 다를 수 있음.
    config:
      tags: [ "MART", "FPNA", "NONAIR" ]
    columns:
      - name: BASIS_DATE
        description: "기준일"
        data_type: DATE
      - name: CONFIRM_KST_DT
        description: "확인 KST 일시"
        data_type: TIMESTAMP
      - name: CONFIRM_KST_DATE
        description: |
          확인 KST 날짜.
          - 원천: `orders.reservations.confirmed_at` 기반 확정일(date).
          - 보정: `RECENT_STATUS='cancel' AND CONFIRM_KST_DATE IS NULL`인 경우 Closing(`MART_FPNA_CONFIRMATION_CLOSING_D.BASIS_DATE`)로 보정한다.
            - 확정 전 취소 케이스는 원천 confirmed_at이 NULL로 남는 정상 시나리오가 존재한다.
            - 이벤트형 집계/시트 대사 목적상, NULL로 인해 이벤트가 누락되지 않도록 \"대사용 기준일\"을 채우는 보정이며, 취소 케이스에 한해서만 적용된다.
        data_type: DATE
      - name: CANCEL_DATE
        description: |
          취소 접수일: 예약 시스템(reservations)에서 취소/환불 이벤트가 발생한 날짜.
          "고객(또는 CS)이 취소를 요청/처리한 시점"을 의미한다.
          원천: MART_SALE_D.CANCEL_KST_DT
          - 숙박: localstay.hotel_reservupdate_detail.reserv_date_kst (kind=2)
          - 서비스: mrt_20.reservation_status_logs.created_at_kst (status='cancel')
          전체환불뿐 아니라 부분환불/여행종료 후 부분환불에서도 기록된다.
        data_type: DATE
      - name: CREATE_KST_DATE
        description: "생성 KST 날짜"
        data_type: DATE
      - name: CREATE_KST_DT
        description: "생성 KST 일시"
        data_type: TIMESTAMP
      - name: TRAVEL_START_DATE
        description: "여행 시작일"
        data_type: DATE
      - name: TRAVEL_END_DATE
        description: "여행 종료일"
        data_type: DATE
      - name: RESVE_CANCEL_DAY_DIFF
        description: "예약 취소 일수 차이"
        data_type: INTEGER
      - name: TRAVEL_DAYS
        description: "여행 일수"
        data_type: INTEGER
      - name: PARTNER_SALES_TYPE
        description: "파트너 판매 유형"
        data_type: STRING
      - name: PARTNER_SETTLE_TYPE
        description: "파트너 정산 유형. 파트너별 내부정산/별도정산 구분 조회 기준 테이블은 DW_MRT_SETTLEMENTS_PARTNER_SETTLEMENT_CONFIGS 사용함."
        data_type: STRING
      - name: PARTNER_ID
        description: "파트너 ID"
        data_type: STRING
      - name: PARTNER_NM
        description: "파트너 이름"
        data_type: STRING
      - name: PROVIDER_CD
        description: "제공자 코드"
        data_type: STRING
      - name: HOTEL_CAMPAIGN_ID
        description: "호텔 캠페인 ID"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_1_CD
        description: "표준 카테고리 레벨 1 코드"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_1_NM
        description: "표준 카테고리 레벨 1 이름"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_2_CD
        description: "표준 카테고리 레벨 2 코드"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_2_NM
        description: "표준 카테고리 레벨 2 이름"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_3_CD
        description: "표준 카테고리 레벨 3 코드"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_3_NM
        description: "표준 카테고리 레벨 3 이름"
        data_type: STRING
      - name: BIZ_TYPE
        description: "비즈니스 유형"
        data_type: STRING
      - name: BIZ_TYPE_V2
        description: "비즈니스 유형 V2"
        data_type: STRING
      - name: BIZ_TYPE_V3
        description: "비즈니스 유형 V3"
        data_type: STRING
      - name: FPNA_TYPE_LV_1
        description: "FPNA 유형 레벨 1. FPNA_TYPE_V3 매핑 테이블에서 BIZ_TYPE_V3 기준 조회."
        data_type: STRING
      - name: FPNA_TYPE_LV_2
        description: "FPNA 유형 레벨 2. FPNA_TYPE_V3 매핑 테이블에서 BIZ_TYPE_V3 기준 조회."
        data_type: STRING
      - name: FPNA_TYPE_LV_3
        description: "FPNA 유형 레벨 3. FPNA_TYPE_V3 매핑 테이블에서 BIZ_TYPE_V3 기준 조회."
        data_type: STRING
      - name: MRT_TYPE
        description: "MRT 유형"
        data_type: STRING
      - name: CATEGORY_CD
        description: "카테고리 코드"
        data_type: STRING
      - name: CATEGORY_NM
        description: "카테고리 이름"
        data_type: STRING
      - name: SUB_CATEGORY_CD
        description: "하위 카테고리 코드"
        data_type: STRING
      - name: FPNA_CATEGORY
        description: "FPNA 카테고리"
        data_type: STRING
      - name: TEAM_DIVISION
        description: "팀 구분"
        data_type: STRING
      - name: GID
        description: "GID"
        data_type: STRING
      - name: GPID
        description: "GPID"
        data_type: STRING
      - name: PRODUCT_ID
        description: "상품 ID"
        data_type: STRING
      - name: PRODUCT_TITLE
        description: "상품 제목"
        data_type: STRING
      - name: REGION_TYPE
        description: "지역 유형"
        data_type: STRING
      - name: REGION_NM
        description: "지역 이름"
        data_type: STRING
      - name: REGION_TNA_NM
        description: "T&A 팀 기준 Region 명 (구글 시트 매핑)"
        data_type: STRING
      - name: COUNTRY_NM
        description: "국가 이름"
        data_type: STRING
      - name: CITY_NM
        description: "도시 이름"
        data_type: STRING
      - name: JEJU_FLAG
        description: "제주도 여부"
        data_type: STRING
      - name: DOMAIN_NM
