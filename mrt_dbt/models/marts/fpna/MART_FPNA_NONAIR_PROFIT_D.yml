        data_type: STRING
      - name: FPNA_DOMAIN_NM
        description: "FPNA 도메인 구분. LODGMENT/RENTALCAR/TNA/PACKAGE/INSURANCE. 매크로에서 리터럴로 부여."
        data_type: STRING
      - name: SALE_FORM_CD
        description: "판매 형태 코드"
        data_type: STRING
      - name: B2B_COUPON_FLAG
