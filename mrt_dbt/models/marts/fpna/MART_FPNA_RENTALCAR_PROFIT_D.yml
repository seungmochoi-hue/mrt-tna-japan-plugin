version: 2

models:
  - name: MART_FPNA_RENTALCAR_PROFIT_D
    description: |
      FPNA 렌터카/교통 상품별 수익 분석 마트.
      MART_SALE_D(KIND=1, STANDARD_CATEGORY_LV_1_CD='TRANSPORTATION_V2')를 기준으로
      렌터카/유럽철도 등 교통 예약 건별 매출, MRT 수수료 매출, 쿠폰/포인트/할인/채널수수료/대행수수료 등 손익 항목을 산출.
      Grain: 1 row = 1 예약(RESVE_ID).
      COMMISSION_RATE/MRT_SALES_PRICE: 기존 3가지 분기(TYPE 1, 2, 99) 로직으로 산출.
      upstream: MART_SALE_D, MART_USER_D, MART_COUPON_RESVE_D,
      FPNA_* 매핑 테이블, DW_MRT_TRIMO_RESERVATION(해외렌터카 Trimo 데이터).
      기존 3가지 분기(TYPE 1, 2, 99)는 Trimo 해외렌터카, 유효 수수료율, 기본 5% 규칙을 따른다.
      BigQuery 물리 최적화: partition(BASIS_DATE, month) + cluster(SALE_FORM_CD, RECENT_STATUS, DOMAIN_NM)
    config:
      tags: [ "MART", "FPNA", "RENTALCAR" ]
    columns:
      - name: BASIS_DATE
        description: "기준일"
        data_type: DATE
      - name: TRAVEL_START_DATE
        description: "여행 시작일"
        data_type: DATE
      - name: TRAVEL_END_DATE
        description: "여행 종료일"
        data_type: DATE
      - name: TRAVEL_DAYS
        description: "여행 일수. 계산식: DATE_DIFF(TRAVEL_END_DATE, TRAVEL_START_DATE, DAY)"
        data_type: INTEGER
      - name: CANCEL_DATE
        description: "취소일. MART_SALE_D KIND=2 기준 취소 건의 취소 일자"
        data_type: DATE
      - name: RESVE_CANCEL_DAY_DIFF
        description: "예약일~취소일 간 일수 차이. 계산식: DATE_DIFF(CANCEL_DATE, BASIS_DATE, DAY)"
        data_type: INTEGER
      - name: RECENT_STATUS
        description: "최근 예약 상태"
        data_type: STRING
      - name: ORDER_ID
        description: "주문 ID"
        data_type: STRING
      - name: ORDER_NO
        description: "주문 번호"
        data_type: STRING
      - name: RESVE_ID
        description: "예약 ID"
        data_type: STRING
      - name: DOMAIN_NM
        description: "도메인 이름 (2.0 PRODUCT / 3.0 PRODUCT 등)"
        data_type: STRING
      - name: RESVE_PRSNL_CNT
        description: "예약 인원 수"
        data_type: INTEGER
      - name: TRAVEL_ID
        description: "여행 ID"
        data_type: STRING
      - name: TRAVEL_DETAIL_ID
        description: "여행 상세 ID"
        data_type: INTEGER
      - name: MRT_STAFF_FLAG
        description: "MRT 직원 여부. MART_USER_D 기준"
        data_type: BOOLEAN
      - name: USER_ID
        description: "사용자 ID"
        data_type: STRING
      - name: CATEGORY_NM
        description: "카테고리 이름"
        data_type: STRING
      - name: CATEGORY_CD
        description: "카테고리 코드"
        data_type: STRING
      - name: SUB_CATEGORY_CD
        description: "하위 카테고리 코드"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_1_CD
        description: "표준 카테고리 레벨 1 코드"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_1_NM
        description: "표준 카테고리 레벨 1 이름"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_2_CD
        description: "표준 카테고리 레벨 2 코드"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_2_NM
        description: "표준 카테고리 레벨 2 이름"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_3_CD
        description: "표준 카테고리 레벨 3 코드"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_3_NM
        description: "표준 카테고리 레벨 3 이름"
        data_type: STRING
      - name: PARTNERSHIP_TYPE
        description: "파트너십 유형"
        data_type: STRING
      - name: PROVIDER_CD
        description: "공급자 코드"
        data_type: STRING
      - name: ACCOUNTING_PROJECT_CODE
        description: "회계 프로젝트 코드. partner_settlement_configs 기준"
        data_type: STRING
      - name: SALE_FORM_CD
        description: |
          판매 형태 코드. 분기:
          - PARTNERSHIP_TYPE='AGENCY' -> 'B2B'
          - B2B 포인트 사용 예약 -> 'B2B'
          - 그 외 -> 'MRT'
        data_type: STRING
      - name: MRT_TYPE
        description: "MRT 유형"
        data_type: STRING
      - name: BIZ_TYPE
        description: "비즈니스 유형. FPNA_BIZ_TYPE_INFO에서 PARTNER_ID 또는 GID 기준 매핑"
        data_type: STRING
      - name: BIZ_TYPE_V2
        description: |
          비즈니스 유형 V2. 세분화된 분류:
          - B2B_AGENCY_RC: PARTNERSHIP_CD 존재
          - B2B_AFFILIATE_POINT_RC: B2B 포인트 사용
          - B2B_AFFILIATE_COUPON_RC: B2B 제휴 쿠폰 사용
          - B2B_AGENCY_MYLINK_RC: 마이링크 파트너십
          - OUTBOUND_TRAIN_RAILEUROPE: 유럽철도
          - DOMESTIC_RENTALCAR: 국내 렌터카
          - OUTBOUND_RENTALCAR: 해외 렌터카
        data_type: STRING
      - name: BIZ_TYPE_V3
        description: |
          비즈니스 유형 V3. 순수 상품 유형 분류 (B2B 구분 제외):
          - OUTBOUND_TRAIN_RAILEUROPE: 유럽철도
          - DOMESTIC_RENTALCAR: 국내 렌터카
          - OUTBOUND_RENTALCAR: 해외 렌터카
        data_type: STRING
      - name: FPNA_CATEGORY
        description: "FPNA 카테고리. FPNA_CATEGORY_INFO에서 STANDARD_CATEGORY_LV_3_CD 기준 매핑"
        data_type: STRING
      - name: TEAM_DIVISION
        description: "팀 구분"
        data_type: STRING
      - name: FLIGHT_RESVE_ID
        description: "항공 예약 ID"
        data_type: STRING
      - name: FLIGHT_CREATE_KST_DT
        description: "항공 생성 KST 일시"
        data_type: TIMESTAMP
      - name: FLIGHT_TRAVEL_START_KST_DATE
        description: "항공 여행 시작 KST 날짜"
        data_type: DATE
      - name: HOTEL_CAMPAIGN_ID
        description: "호텔 캠페인 ID"
        data_type: STRING
      - name: CREATE_KST_DT
        description: "예약 생성 KST 일시"
        data_type: TIMESTAMP
      - name: CONFIRM_KST_DT
        description: "예약 확정 KST 일시"
        data_type: TIMESTAMP
      - name: CONFIRM_KST_DATE
        description: "예약 확정 KST 날짜"
        data_type: DATE
      - name: CREATE_KST_DATE
        description: "예약 생성 KST 날짜"
        data_type: DATE
      - name: PARTNER_ID
        description: "파트너 ID"
        data_type: STRING
      - name: PARTNER_NM
        description: "파트너 이름. partners.partner 테이블 기준"
        data_type: STRING
      - name: GID
        description: "상품 그룹 ID"
        data_type: STRING
      - name: GPID
        description: "상품 그룹 상위 ID"
        data_type: STRING
      - name: PRODUCT_ID
        description: "상품 ID"
        data_type: STRING
      - name: PRODUCT_TITLE
        description: "상품 제목"
        data_type: STRING
      - name: REGION_TYPE
        description: "지역 유형. COUNTRY_NM이 한국이면 'Domestic', 그 외 'Outbound'"
        data_type: STRING
      - name: REGION_NM
        description: "지역 이름"
        data_type: STRING
      - name: COUNTRY_NM
        description: "국가 이름. NULL이면 'Others'"
        data_type: STRING
      - name: CITY_NM
        description: "도시 이름. NULL이면 'Others'"
        data_type: STRING
      - name: JEJU_FLAG
        description: "제주도 여부 (Y/N). CITY_NM='Jeju' AND COUNTRY_NM='Korea, Republic of'일 때 'Y'"
        data_type: STRING
      - name: COUPON_ID
        description: "대표 쿠폰 ID. 사용 이력 > 상품쿠폰 > 예약 이력 template_id > 프로모션쿠폰 순"
        data_type: INTEGER
      - name: PRODUCT_COUPON_ID
        description: "상품쿠폰 대표 템플릿 ID"
        data_type: INTEGER
      - name: ORDER_COUPON_ID
        description: "주문쿠폰 대표 템플릿 ID"
        data_type: INTEGER
      - name: COUPON_TITLE
        description: "쿠폰 제목. COUPON_ID와 동일한 우선순위로 결정. 매핑 불가 시 'UNKNOWN'"
        data_type: STRING
      - name: COUPON_PUBLISH_TEAM_NM
        description: "쿠폰 발행 팀 이름. MART_COUPON_RESVE_D 기준. 매핑 불가 시 'UNKNOWN'"
        data_type: STRING
      - name: COUPON_PUBLISH_PURPOSE_NM
        description: "쿠폰 발행 목적 이름. MART_COUPON_RESVE_D 기준. 매핑 불가 시 'UNKNOWN'"
        data_type: STRING
      - name: CROSS_SELL_FLAG
        description: "크로스 셀 여부 (Y/N). NULL이면 'N'"
        data_type: STRING
      - name: COMMISSION_RATE
        description: |
          MRT 수수료율 (VAT 제외). 기존 3가지 분기 로직으로 산출.
          fallback 분기: (1) Trimo 해외렌터카(ORP 매핑) -> ORP.COMMISSION_RATE, (2) 유효 수수료율 -> commission_rate/1.1, (3) 기본 -> 0.05/1.1.
          참고: CAR- prefix(Trimo 해외렌터카)는 ORP 매핑 분기(1번) 사용.
        data_type: FLOAT
      - name: SALES_COMMISSION_PRICE
        description: "MART_SALE_D의 원본 commission_price"
        data_type: FLOAT
      - name: PARTNER_SETTLE_TYPE
        description: "파트너 정산 유형 (internal/external)"
        data_type: STRING
      - name: PARTNER_SALES_TYPE
        description: "파트너 판매 유형"
        data_type: STRING
      - name: PARTNERSHIP_CD
        description: "파트너십 코드"
        data_type: STRING
      - name: MARKETING_PARTNERSHIP_CD
        description: "마케팅 파트너십 코드"
        data_type: STRING
      - name: PG_NM
        description: "PG사 이름. pg_fee_data CTE에서 결제 수단별 매핑 (TOSSPAYMENTS, KCP 등)"
        data_type: STRING
      - name: SALES_KRW_PRICE
        description: "원화 판매 금액 (GMV)"
        data_type: FLOAT
      - name: MRT_SALES_PRICE
        description: |
          MRT 수수료 매출 (VAT 제외). 기존 역산 로직으로 산출.
          fallback 분기: (1) Trimo 해외렌터카 -> ORP.MRT_SALES_PRICE, (2) 유효 수수료율 -> SALES_KRW_PRICE * commission_rate / 1.1, (3) 기본 5% -> SALES_KRW_PRICE * 0.05 / 1.1.
          NULL 시 0으로 대체.
        data_type: FLOAT
      - name: MRT_SALES_PRICE_TYPE
        description: |
          MRT_SALES_PRICE 산출 분기 번호.
          - 1: Trimo 해외렌터카 (DW_MRT_TRIMO_RESERVATION 매핑 성공)
          - 2: 유효 수수료율 존재 (internal 정산 commission_rate!=1 또는 일반 commission_rate!=1)
          - 99: 기본 5% 적용
        data_type: INTEGER
      - name: COUPON_PRICE
        description: |
          쿠폰 비용 금액(VAT 제외, 마이리얼트립 부담분).
          상품쿠폰 부담분과 주문쿠폰 부담분을 각각 계산해 합산한 최종값.
          - 상품쿠폰: fpna_coupon_info(type='2.0 product', '3.0 product')의 mrt_rate 또는 mrt_value 적용
          - 3.0 쿠폰: fpna_coupon_info(type='3.0 product')와 COUPON_EXTRA_INFO의 mrt_value 또는 mrt_contribution_rate 적용
          - 매핑이 없으면 fallback 부담분 사용, NULL은 0 처리
        data_type: INTEGER
      - name: PRODUCT_COUPON_PRICE
        description: "상품쿠폰 비용 금액(VAT 제외, 마이리얼트립 부담분). COUPON_PRICE 구성 요소"
        data_type: INTEGER
      - name: ORDER_COUPON_PRICE
        description: "주문쿠폰 비용 금액(VAT 제외, 마이리얼트립 부담분). COUPON_PRICE 구성 요소"
        data_type: INTEGER
      - name: POINT_PRICE
        description: "포인트 사용 금액. MART_SALE_D의 point_price 원본값. NULL 시 0"
        data_type: INTEGER
      - name: EXCLUDED_POINT_PRICE
        description: |
          손익 계산에서 제외되는 포인트 금액.
          FPNA_EXCEPTED_POINT_INFO의 template_id에 해당하는 포인트가 사용된 예약의 경우
          point_price를 그대로 반환. 해당하지 않으면 0.
        data_type: INTEGER
      - name: DISCOUNT_PRICE
        description: "할인 금액 (VAT 제외). 계산식: MART_SALE_D.DISCOUNT_PRICE / 1.1. NULL 시 0"
        data_type: FLOAT
      - name: CHANNEL_FEE_PRICE
        description: |
          채널 수수료 (PG 수수료).
          계산식: SALES_KRW_PRICE * pg_com_rate (FLOOR 처리, 소수점 2자리).
          pg_com_rate는 FPNA_PG_INFO에서 PG사/기간별 매핑. 매핑 실패 시 기본값 2%(0.02).
          Trimo 해외렌터카(ORP 매핑 건)는 0. NULL 시 0.
        data_type: FLOAT
      - name: AGENCY_FEE
        description: |
          대행사 수수료.
          payment_product_closing 테이블의 partnership_commission 합계. NULL 시 0.
        data_type: INTEGER
      - name: MARKETING_PARTNER_FEE
        description: |
          마케팅 파트너 수수료.
          payment_product_closing 테이블의 marketing_partnership_commission 합계. NULL 시 0.
        data_type: INTEGER
      - name: AFFILIATE_POINT_FEE
        description: |
          B2B 제휴 포인트 수수료.
          B2B 포인트를 사용한 예약(b2b_point_rsv)에 한해 point_price * 0.02(2%).
          해당하지 않으면 0. NULL 시 0.
        data_type: FLOAT
      - name: NET_PRICE
        description: "순 판매금액. 현재 NULL로 고정 (CAST(NULL AS FLOAT64))"
        data_type: FLOAT
      - name: DW_LOAD_DT
        description: "DW 적재 일시 (KST 기준)"
        data_type: TIMESTAMP
