version: 2

models:
  - name: DW_HOTEL_RESERVATION
    description: "호텔 예약"
    config:
      tags: ["HOTEL"]
    columns:
      - name: id
        description: "예약 ID"
        data_type: STRING
      - name: history_id
        description: "예약 이력 ID"
