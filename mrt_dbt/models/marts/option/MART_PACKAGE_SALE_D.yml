version: 2

models:
  - name: MART_PACKAGE_SALE_D
    description: 패키지 예약 상세 테이블입니다.
    config:
      tags: ['PACKAGE', 'MART']
    columns:
      - name: BASIS_DATE
        description: "기준 날짜. KIND=1: 최초 결제일, KIND=2: 최초 환불일. 분할환불 시 전체 금액이 최초 환불일에 귀속"
        data_type: DATE
      - name: USER_ID
        description: "사용자 ID"
        data_type: STRING
      - name: RESVE_ID
        description: "예약 ID"
        data_type: STRING
      - name: RESVE_OPTION_ID
        description: "예약 옵션 ID"
        data_type: STRING
      - name: ORDER_ID
        description: "주문 ID"
        data_type: STRING
      - name: PRODUCT_ID
        description: "상품 ID"
        data_type: STRING
      - name: OPTION_ID
        description: "옵션 ID"
        data_type: STRING
      - name: PACKAGE_GID
        description: "패키지 GID"
        data_type: STRING
      - name: PACKAGE_SYNC_ID
        description: "패키지 SYNC ID"
        data_type: STRING
      - name: PAKAGE_OPTION_GID
        description: "패키지 옵션 GID"
        data_type: STRING
      - name: KIND
        description: "1=판매, 2=취소. KIND=2는 옵션당 최대 1건, 분할환불 합산"
        data_type: INTEGER
      - name: PACKAGE_TITLE
        description: "패키지 제목"
        data_type: STRING
      - name: PACKAGE_SYNC_TITLE
        description: "패키지 SYNC 제목"
        data_type: STRING
      - name: PACKAGE_OPTION_TITLE
        description: "패키지 옵션 제목"
        data_type: STRING
      - name: PACKAGE_OPTION_TYPE
        description: "패키지 옵션 유형"
        data_type: STRING
      - name: CANCEL_KST_DT
        description: "취소 KST 날짜"
        data_type: TIMESTAMP
      - name: RESVE_RECENT_STATUS
        description: "예약 최근 상태"
        data_type: STRING
      - name: TRAVEL_START_KST_DATE
        description: "여행 시작 KST 날짜"
        data_type: DATE
      - name: TRAVEL_END_KST_DATE
        description: "여행 종료 KST 날짜"
        data_type: DATE
      - name: PG_NM
        description: "PG 이름"
        data_type: STRING
      - name: PLATFORM
        description: "플랫폼"
        data_type: STRING
      - name: RESVE_PAID_KST_DT
        description: "예약 결제 KST 날짜"
        data_type: TIMESTAMP
      - name: PACKAGE_STANDARD_CATEGORY_LV_1_CD
        description: "패키지 표준 카테고리 레벨 1 코드"
        data_type: STRING
      - name: PACKAGE_STANDARD_CATEGORY_LV_1_NM
        description: "패키지 표준 카테고리 레벨 1 명"
        data_type: STRING
      - name: PACKAGE_STANDARD_CATEGORY_LV_2_CD
        description: "패키지 표준 카테고리 레벨 2 코드"
        data_type: STRING
      - name: PACKAGE_STANDARD_CATEGORY_LV_2_NM
        description: "패키지 표준 카테고리 레벨 2 명"
        data_type: STRING
      - name: PACKAGE_STANDARD_CATEGORY_LV_3_CD
        description: "패키지 표준 카테고리 레벨 3 코드"
        data_type: STRING
      - name: PACKAGE_STANDARD_CATEGORY_LV_3_NM
        description: "패키지 표준 카테고리 레벨 3 명"
        data_type: STRING
      - name: CREATE_KST_DT
        description: "생성 KST 날짜"
        data_type: TIMESTAMP
      - name: UPDATE_KST_DT
        description: "수정 KST 날짜"
        data_type: TIMESTAMP
      - name: PACKAGE_PARTNER_ID
        description: "패키지 파트너 ID"
        data_type: STRING
      - name: PACKAGE_OPTION_PARTNER_ID
        description: "패키지 옵션 파트너 ID"
        data_type: STRING
      - name: SALES_PRICE
        description: "판매 금액. KIND=1: sale_price, KIND=2: SUM(refund_amount) 부호 반전, 분할환불 합산액"
        data_type: INTEGER
      - name: PAID_PRICE
        description: "결제 금액"
        data_type: INTEGER
      - name: COUPON_PRICE
        description: "총 쿠폰 금액"
        data_type: INTEGER
      - name: PRODUCT_COUPON_PRICE
        description: "상품쿠폰 금액"
        data_type: INTEGER
      - name: ORDER_COUPON_PRICE
        description: "주문쿠폰 금액"
        data_type: INTEGER
      - name: PRODUCT_COUPON_ID
        description: "상품쿠폰 대표 ID"
        data_type: INTEGER
      - name: ORDER_COUPON_ID
        description: "주문쿠폰 대표 ID"
        data_type: INTEGER
      - name: POINT_PRICE
        description: "포인트 금액"
        data_type: INTEGER
      - name: PAYMENT_METHOD_VALUE
        description: "결제 방법 값"
        data_type: STRING
      - name: PAYMENT_COMMISSION_RATE
        description: "결제 수수료 비율"
        data_type: NUMERIC
      - name: PAYMENT_COMMISSION_PRICE
        description: "결제 수수료 금액"
        data_type: INTEGER
      - name: SETTLEMENT_COMMISSION_RATE
        description: "정산 수수료 비율"
        data_type: FLOAT
      - name: SETTLEMENT_COMMISSION_PRICE
        description: "정산 수수료 금액"
        data_type: INTEGER
      - name: CITY_NM
        description: "도시 이름"
        data_type: STRING
      - name: COUNTRY_NM
        description: "나라 이름"
        data_type: STRING
      - name: REGION_NM
        description: "지역 이름"
        data_type: STRING
      - name: RESVE_PURPOSE_TYPE
        description: "예약 목적 유형"
        data_type: STRING
      - name: DW_LOAD_DT
        description: "DW 적재 일시"
        data_type: TIMESTAMP
