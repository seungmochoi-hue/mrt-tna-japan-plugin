version: 2

models:
  - name: MART_TNA_OPTION_SALE_D
    description: |
      액티비티(TNA) 예약 옵션 단위 결제/취소 내역 마트.
      Grain: RESVE_OPTION_ID + KIND. KIND=1(결제)과 KIND=2(취소) 각각 1건씩 존재.
      KIND=2 취소 내역은 option_reservation_refunds를 RESVE_OPTION_ID 단위로 집약(1건)하고 SUM(refund_amount)로 환불 합산 금액 산출.
      패키지(package_reservation)와 숙박(unionstay.reservation) 소속 예약은 제외.
      package_reservation 조인 누락 방어를 위해 reservation_no가 PKG 접두인 예약은 추가로 제외.
      RESVE_TYPE: 렌터카 상품(TRANSPORTATION_V2)은 'RENTALCAR', 그 외는 'TNA'로 구분.
      도시/국가/지역 정보는 TNA 상품 기준 조회를 우선하고, 렌터카 차량 대리점 위치를 폴백으로 사용.
    config:
      tags: ['TNA', 'MART']
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - RESVE_OPTION_ID
            - KIND
          config:
            severity: warn
    columns:
      - name: BASIS_DATE
        description: |
          집계 기준 일자.
          KIND=1(결제): 첫 결제일.
          KIND=2(취소): 최초 환불 완료일.
        data_type: DATE
        tests:
          - not_null:
              config:
                severity: warn
      - name: USER_ID
        description: "예약자 사용자 ID."
        data_type: STRING
      - name: RESVE_ID
        description: "TNA 예약 ID."
        data_type: STRING
        tests:
          - not_null:
              config:
                severity: warn
      - name: RESVE_OPTION_ID
        description: "예약 옵션 ID. RESVE_OPTION_ID + KIND가 행 고유 식별자."
        data_type: STRING
        tests:
          - not_null:
              config:
                severity: warn
      - name: ORDER_ID
        description: "주문 ID."
        data_type: STRING
      - name: PRODUCT_ID
        description: "TNA 상품 ID."
        data_type: STRING
      - name: OPTION_ID
        description: "TNA 옵션 ID."
        data_type: STRING
      - name: GID
        description: |
          상품 그룹 ID.
          union_product_id가 존재하면 해당 값, 없으면 상품 ID 기준 조회 값을 폴백으로 사용.
        data_type: STRING
      - name: OPTION_GID
        description: "옵션 그룹 ID."
        data_type: STRING
      - name: RESVE_TYPE
        description: |
          예약 유형 구분.
          표준 카테고리 LV_1_CD가 'TRANSPORTATION_V2'인 경우 'RENTALCAR', 그 외 'TNA'.
        data_type: STRING
      - name: KIND
        description: "결제/취소 구분. 1: 결제, 2: 취소."
        data_type: INTEGER
      - name: PRODUCT_TITLE
        description: "TNA 상품명."
        data_type: STRING
      - name: OPTION_TITLE
        description: "TNA 옵션명."
        data_type: STRING
      - name: CANCEL_KST_DT
        description: "취소 일시 (KST)."
        data_type: TIMESTAMP
      - name: RECENT_STATUS
        description: "옵션 예약 최근 상태 코드 (소문자 변환)."
        data_type: STRING
      - name: TRAVEL_START_KST_DATE
        description: "여행 출발일 (KST)."
        data_type: DATE
      - name: TRAVEL_END_KST_DATE
        description: "여행 귀국일 (KST)."
        data_type: DATE
      - name: PG_NM
        description: "PG사 명칭 (소문자 변환)."
        data_type: STRING
      - name: PLATFORM
        description: "결제 플랫폼 (소문자 변환)."
        data_type: STRING
      - name: RESVE_PAID_KST_DT
        description: "최초 결제 일시 (KST)."
        data_type: TIMESTAMP
      - name: STANDARD_CATEGORY_LV_1_CD
        description: "표준 카테고리 1단계 코드. 상품 기준 조회, 없으면 폴백 조회."
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_1_NM
        description: "표준 카테고리 1단계 명칭. 상품 기준 조회, 없으면 폴백 조회."
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_2_CD
        description: "표준 카테고리 2단계 코드. 상품 기준 조회, 없으면 폴백 조회."
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_2_NM
        description: "표준 카테고리 2단계 명칭. 상품 기준 조회, 없으면 폴백 조회."
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_3_CD
        description: "표준 카테고리 3단계 코드. 상품 기준 조회, 없으면 폴백 조회."
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_3_NM
        description: "표준 카테고리 3단계 명칭. 상품 기준 조회, 없으면 폴백 조회."
        data_type: STRING
      - name: CREATE_KST_DT
        description: "옵션 예약 생성 일시 (KST)."
        data_type: TIMESTAMP
      - name: UPDATE_KST_DT
        description: "옵션 예약 최종 수정 일시 (KST)."
        data_type: TIMESTAMP
      - name: OPTION_PARTNER_ID
        description: "옵션 담당 파트너 ID."
        data_type: STRING
      - name: SALES_PRICE
        description: |
          판매/환불 금액 (원화).
          KIND=1(결제): 옵션 원가 × 1.
          KIND=2(취소): SUM(option_reservation_refunds.refund_amount) (실제 환불 합산 금액) × -1.
        data_type: INTEGER
      - name: PAID_PRICE
        description: |
          실 결제 금액 (원화). 쿠폰/포인트 할인 차감 후 금액.
          산출식: ROUND(sale_price - 쿠폰비례배분 - 포인트비례배분, 0) × 부호(KIND=1: 1, KIND=2: -1).
          쿠폰/포인트는 예약 전체 금액 대비 옵션 비중으로 비례 배분.
        data_type: INTEGER
      - name: COUPON_PRICE
        description: |
          총 쿠폰 할인 금액 (원화)
        data_type: INTEGER
      - name: PRODUCT_COUPON_PRICE
        description: "상품쿠폰 할인 금액"
        data_type: INTEGER
      - name: ORDER_COUPON_PRICE
        description: "주문쿠폰 할인 금액"
        data_type: INTEGER
      - name: PRODUCT_COUPON_ID
        description: "상품쿠폰 대표 ID"
        data_type: INTEGER
      - name: ORDER_COUPON_ID
        description: "주문쿠폰 대표 ID"
        data_type: INTEGER
      - name: POINT_PRICE
        description: |
          포인트 사용 금액 (원화). 예약 전체 포인트 사용액을 옵션 금액 비중으로 비례 배분.
          KIND=2(취소) 시 음수.
        data_type: INTEGER
      - name: PAYMENT_METHOD_VALUE
        description: "결제 수단 상세값."
        data_type: STRING
      - name: PAYMENT_COMMISSION_RATE
        description: "결제 수수료율. 원천 비율값 ÷ 100 (소수점 4자리 반올림)."
        data_type: NUMERIC
      - name: PAYMENT_COMMISSION_PRICE
        description: "결제 수수료 금액 (원화). 판매 수수료 × 부호(KIND=1: 1, KIND=2: -1)."
        data_type: INTEGER
      - name: SETTLEMENT_COMMISSION_RATE
        description: "정산 수수료율. 원천 비율값 ÷ 100 (소수점 4자리 반올림)."
        data_type: FLOAT
      - name: SETTLEMENT_COMMISSION_PRICE
        description: "정산 수수료 금액 (원화). 정산 수수료 × 부호(KIND=1: 1, KIND=2: -1)."
        data_type: INTEGER
      - name: CITY_NM
        description: "도시명. TNA 상품 기준 조회를 우선하고 렌터카 대리점 위치를 폴백으로 사용."
        data_type: STRING
      - name: COUNTRY_NM
        description: "국가명. TNA 상품 기준 조회를 우선하고 렌터카 대리점 위치를 폴백으로 사용."
        data_type: STRING
      - name: REGION_NM
        description: "지역명. TNA 상품 기준 조회를 우선하고 렌터카 대리점 위치를 폴백으로 사용."
        data_type: STRING
      - name: RESVE_PURPOSE_TYPE
        description: "예약 목적 유형 (소문자 변환)."
        data_type: STRING
      - name: DW_LOAD_DT
        description: "DW 적재 일시 (실행 시점 기준 KST)."
        data_type: TIMESTAMP
