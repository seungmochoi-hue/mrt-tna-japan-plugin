version: 2

models:
  - name: MART_POINT_D
    description: 포인트 이력 테이블
    columns:
    - name: BASIS_DATE
      description: 기준일
      data_type: DATE
    - name: POINT_ID
      description: 포인트 아이디
      data_type: STRING
    - name: TEMPLATE_ID
      description: 포인트 템플릿 아이디
      data_type: STRING
    - name: TEMPLATE_NM
      description: 포인트 템플릿 명
