    - name: TEMPLATE_START_KST_DT
      description: "포인트 템플릿 시작 KST 일시"
      data_type: TIMESTAMP
    - name: TEMPLATE_EXPIRE_KST_DT
      description: "포인트 템플릿 만료 KST 일시"
      data_type: TIMESTAMP
