version: 2

models:
  - name: MART_AIR_PNR_SALE_D
    description: |
      항공 PNR 단위 판매 마트. MART_AIR_SALE_D(티켓 단위)를 PNR_NO 기준으로 집계.
      금액 컬럼은 SUM, SALE_AGG_TYPE은 우선순위(B2C_ON > PACKAGE > AGENCY > CUSTOMIZED > EMPLOYEE > CORPORATION) 적용.
      국내선 왕복은 SUPER_PNR_NO로 출발/귀국일을 보정함.
      BigQuery 물리 최적화: partition(BASIS_DATE, month) + cluster(SALE_FORM_CD, KIND)
    columns:
      - name: BASIS_DATE
        description: "기준 일자"
        data_type: DATE

      - name: PNR_NO
        description: "PNR 번호"
        data_type: NUMERIC

      - name: KIND
        description: "1=결제행, 2=취소행"
        data_type: INTEGER

      - name: SUPER_PNR_NO
        description: "왕복편 연결 PNR 번호. 주로 국내선 왕복 시 가는편/오는편 PNR 연결용"
        data_type: STRING

      - name: ALPHA_PNR_NO
        description: "알파 PNR 번호"
        data_type: STRING

      - name: OLD_PNR_NO
        description: "예전 PNR 번호"
        data_type: NUMERIC

      - name: ON_OFF_RESVE_FLAG
        description: "온라인 오프라인 예약 여부"
        data_type: STRING

      - name: SPLIT_SEARCH_FLAG
        description: "분할 검색 여부"
        data_type: STRING

      - name: GDS_CD
        description: "GDS 코드"
        data_type: STRING

      - name: AIRLINE_CD
        description: "항공사 코드"
        data_type: STRING

      - name: STOCK_AIRLINE_CD
        description: "스톡 항공사 코드"
        data_type: STRING

      - name: SALE_FORM_CD
        description: "판매 형태 코드"
        data_type: STRING

      - name: SALE_FORM_TYPE
        description: "판매 형태 타입"
        data_type: STRING

      - name: BRANCH_CD
        description: "브랜치 코드"
        data_type: STRING

      - name: IND_GROUP_FLAG
        description: "개인 그룹 여부"
        data_type: STRING

      - name: USER_ID
        description: "유저 아이디"
        data_type: STRING

      - name: SEAT_CNT
        description: "좌석 건수"
        data_type: STRING

      - name: FARE_CONFIRM_FLAG
        description: "운임 확정 여부"
        data_type: STRING

      - name: FARE_KIND_CD
        description: "운임 종류 코드"
        data_type: STRING

      - name: FARE_KIND_DETAIL_CD
        description: "운임 종류 상세 코드"
        data_type: STRING

      - name: BPLC_CD
        description: "사업장 코드"
        data_type: STRING

      - name: RESVE_SEAT_GRADE
        description: "예약 좌석 등급"
        data_type: STRING

      - name: RESVE_KST_DT
        description: "예약 KST 일시"
        data_type: TIMESTAMP

      - name: DEPART_KST_DT
        description: "출발 KST 일시"
        data_type: TIMESTAMP

      - name: RETURN_KST_DT
        description: "복귀 KST 일시"
        data_type: TIMESTAMP

      - name: TRIP_TYPE_CD
        description: "여행 유형 코드. OW=편도, RT=왕복, MT=다구간"
        data_type: STRING

      - name: ITIN_NO
        description: "국내선 왕복 여정 순번. PNR_NO < SUPER_PNR_NO이면 1(가는편), >이면 2(오는편)"
        data_type: STRING

      - name: RESVE_STATUS_CD
        description: "예약 상태 코드"
        data_type: STRING

      - name: PAYMENT_STATUS_CD
        description: "결제 상태 코드"
        data_type: STRING

      - name: AUTO_ISSUE_FLAG
        description: "자동 발권 여부"
        data_type: STRING

      - name: ISSUE_KST_DATE
        description: "발권 KST 일자"
        data_type: DATE

      - name: CANCEL_KST_DT
        description: "취소 KST 일시"
        data_type: TIMESTAMP

      - name: TOTAL_ITIN_CONTENT
        description: "전체 여정 내용"
        data_type: STRING

      - name: DOMESTIC_INTERNATIONAL_DIV_CD
        description: "국내선 국제선 구분 코드"
        data_type: STRING

      - name: LOC_ROUTE_CD
        description: "지역 노선 코드"
        data_type: STRING

      - name: DEPART_CITY_FLAG
        description: "출발 도시 여부"
        data_type: STRING

      - name: DEPART_CITY_CD
        description: "출발 도시 코드"
        data_type: STRING

      - name: ARRIVE_COUNTRY_CD
        description: "도착 국가 코드"
        data_type: STRING

      - name: ARRIVE_CITY_CD
        description: "도착 도시 코드"
        data_type: STRING

      - name: ARRIVE_AIRPORT_CD
        description: "도착 공항 코드"
        data_type: STRING

      - name: PAYMENT_PLATFORM
        description: "결제 플랫폼"
        data_type: STRING

      - name: PAYMENT_METHOD_CD
        description: "결제 방식 코드"
        data_type: STRING

      - name: PROMO_FLAG
        description: "프로모션 적용 여부. PNR 내 PROMO_ID 합계 > 0이면 Y"
        data_type: STRING

      - name: MARKETING_PARTNERSHIP_CD
        description: "마케팅 제휴 코드"
        data_type: STRING

      - name: MARKETING_LINK_ID
        description: "마케팅 링크 아이디"
        data_type: STRING

      - name: TRANSIT_FLAG
        description: "운송 여부"
        data_type: STRING

      - name: CODESHARE_FLAG
        description: "코드쉐어 여부"
        data_type: STRING

      - name: PACKAGE_RESVE_ID
        description: "패키지 예약 아이디"
        data_type: STRING

      - name: DISCOUNT_BEFORE_NET_PRICE
        description: "할인 이전 net 금액"
        data_type: FLOAT

      - name: DISCOUNT_AFTER_NET_PRICE
        description: "할인 이후 net 금액"
        data_type: FLOAT

      - name: TAX_PRICE
        description: "세금 금액"
        data_type: FLOAT

      - name: SALE_QUEUE_PRICE
        description: "판매 큐 금액"
        data_type: FLOAT

      - name: FUEL_ADD_PRICE
        description: "유류 추가 금액"
        data_type: FLOAT

      - name: TASF_PRICE
        description: "취급수수료 금액"
        data_type: FLOAT

      - name: SALE_TOTAL_PRICE
        description: "판매 전체 금액"
        data_type: FLOAT

      - name: FEE_PRICE
        description: "수수료 금액"
        data_type: NUMERIC

      - name: FEE_VAT_PRICE
        description: "수수료 VAT 금액"
        data_type: NUMERIC

      - name: POINT_PRICE
        description: "포인트 금액"
        data_type: FLOAT

      - name: CHILD_RESVE_PRSNL_CNT
        description: "아동 예약 인원 건수"
        data_type: INTEGER

      - name: ADULT_RESVE_PRSNL_CNT
        description: "성인 예약 인원 건수"
        data_type: INTEGER

      - name: RESVE_PRSNL_CNT
        description: "예약 인원 건수"
        data_type: INTEGER

      - name: DW_LOAD_DT
        description: "DW 적재 일시"
        data_type: TIMESTAMP


