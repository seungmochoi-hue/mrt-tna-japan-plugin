version: 2

models:
  - name: MART_AIR_SALE_D
    description: >
      항공 매출 일자별 서빙 마트.
      RV100/RV110/TK110/TK120/BS110 계열 원천을 결합해 발권/환불/수수료(커미션) 지표를
      `BASIS_DATE`, 티켓, PNR, 노선/공항 차원으로 정규화함.

      항공 운영/정산 리포트에서 동일 계열 지표를 재검증할 때 기준이 되는 마트이며,
      월별 유효발권수, 발권/환불 커미션, TASF 승인금액, BSP/VOF 주기 집계 검증에 활용함.
      BigQuery 물리 최적화: partition(BASIS_DATE, month) + cluster(SALE_FORM_CD, KIND, RECENT_STATUS)
    columns:
      - name: BASIS_DATE
        description: "기준 일자"
        data_type: DATE

      - name: PNR_NO
        description: "PNR 번호"
        data_type: NUMERIC

      - name: AIRLINE_RESVE_ID
        description: "항공사 예약 아이디"
        data_type: STRING

      - name: PAX_NO
        description: "승객 번호"
        data_type: FLOAT

      - name: TICKET_NO
        description: "티켓 번호"
        data_type: STRING

      - name: GID
        description: "GID"
        data_type: STRING

      - name: KIND
        description: "1=결제행, 2=취소행"
        data_type: INTEGER

      - name: RECENT_STATUS
        description: "최근 상태"
        data_type: STRING

      - name: CANCEL_KST_DT
        description: "취소 KST 일시"
        data_type: TIMESTAMP

      - name: ON_OFF_RESVE_FLAG
        description: "온라인 오프라인 예약 여부"
        data_type: STRING

      - name: REISUE_FLAG
        description: "재발행 여부"
        data_type: STRING

      - name: VOID_FLAG
        description: "무효 여부"
        data_type: STRING

      - name: SPLIT_SEARCH_FLAG
        description: "분할 검색 사용 여부 플래그"
        data_type: STRING

      - name: BEFORE_REISUE_TICKET_NO
        description: "이전 재발행 티켓 번호"
        data_type: STRING

      - name: GDS_CD
        description: "GDS 코드"
        data_type: STRING

      - name: SALE_FORM_CD
        description: "판매 형태 코드"
        data_type: STRING

      - name: SALE_FORM_TYPE
        description: "판매 형태 코드"
        data_type: STRING

      - name: SALE_AGG_TYPE
        description: "판매 집계 구분 유형"
        data_type: STRING

      - name: BRANCH_CD
        description: "지점 코드"
        data_type: STRING

      - name: IND_GROUP_FLAG
        description: "개인 그룹 여부"
        data_type: STRING

      - name: USER_ID
