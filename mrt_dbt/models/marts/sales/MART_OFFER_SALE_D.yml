version: 2

models:
  - name: MART_OFFER_SALE_D
    description: |
      3.0 플랫폼(orders) 상품 판매 마트.
      원천: orders.orders/reservations/order_payments. 신규 통합 상품 예약 대상.
      KIND=1 결제행, KIND=2 취소행(금액 음수). 테스트 유저/상품 제외.
    config:
      tags: ["MART", "OFFER"]
    data_tests:
      - dbt_utils.expression_is_true:
          expression: "RESVE_PRSNL_CNT = CHILD_RESVE_PRSNL_CNT + ADULT_RESVE_PRSNL_CNT"
    columns:
      - name: BASIS_DATE
        description: "기준 일자"
        data_type: DATE
      - name: USER_ID
        description: "유저 아이디"
        data_type: STRING
      - name: RESVE_ID
        description: "예약 아이디"
        data_type: STRING
      - name: ORDER_ID
        description: "주문 아이디"
        data_type: STRING
      - name: ORDER_NO
        description: "주문 번호"
        data_type: STRING
      - name: PRODUCT_ID
        description: "상품 아이디"
        data_type: STRING
      - name: GID
        description: "GID"
        data_type: STRING
      - name: GPID
        description: "GPID"
        data_type: STRING
      - name: KIND
        description: "1=결제행, 2=취소행"
        data_type: INTEGER
      - name: RECENT_STATUS
        description: "최근 상태"
        data_type: STRING
      - name: CANCEL_KST_DT
        description: "취소 KST 일시"
        data_type: TIMESTAMP
      - name: CANCEL_REASON
        description: "취소 사유"
        data_type: STRING
      - name: CANCEL_SUBJECT
        description: "취소 주제"
        data_type: STRING
      - name: REFUND_TYPE
        description: "환불 유형"
        data_type: STRING
      - name: PRODUCT_TYPE
        description: "상품 유형"
        data_type: STRING
      - name: ORDER_RESVE_TYPE
        description: "주문 예약 유형"
        data_type: STRING
      - name: CATEGORY_NM
        description: "카테고리 명"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_1_CD
        description: "표준 카테고리 레벨 1 코드"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_2_CD
        description: "표준 카테고리 레벨 2 코드"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_3_CD
        description: "표준 카테고리 레벨 3 코드"
