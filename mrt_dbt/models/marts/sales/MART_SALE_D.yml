        data_type: DATE
      - name: CREATE_KST_DATE
        description: "생성 KST 일자"
        data_type: DATE
      - name: CANCEL_KST_DT
        description: "취소 KST 일시"
        data_type: TIMESTAMP
      - name: TRAVEL_START_KST_DATE
        description: "여행 시작 KST 일자"
        data_type: DATE
      - name: TRAVEL_END_KST_DATE
