version: 2

models:
  - name: MART_SALE_D
    description: |
      도메인 통합 판매 마트. 이 테이블로 산출하는 금액은 거래액(GMV)임.
      FP&A/매출관리팀 기준 매출(Revenue)과는 다르므로 혼동하지 않는다.
      도메인별 원천 키 체계를 정규화해 단일 스키마로 제공한다.
      ORDER_ID는 도메인별 생성 규칙을 따르는 통합 식별자이며, 원천 주문키와 1:1을 항상 보장하지 않는다.
      특히 INSURANCE는 policy 기반 가공 키(im*/ia*)가 포함될 수 있다.
      매출 조회 시 확정일(CONFIRM_KST_DATE) 기준이 아닌 BASIS_DATE(기준 일자) 기준으로 집계함.
      BigQuery 물리 최적화: partition(BASIS_DATE, month) + cluster(DOMAIN_NM, KIND, RECENT_STATUS)
    config:
      tags: ["MART", "SALE"]
    columns:
      - name: BASIS_DATE
        description: "기준 일자"
        data_type: DATE
        data_tests:
          - not_null

      - name: RESVE_ID
        description: "예약 아이디"
        data_type: STRING
        data_tests:
          - unique:
              config:
                where: "KIND = 1"

      - name: ORDER_ID
        description: |
          통합 주문 식별자(정규화 키).
          도메인별 생성 규칙이 다르며 원천 주문키와 불일치할 수 있다.
          예) AIR=f{PNR}, HOTEL=h{RESVE_ID}, 2.0 PRODUCT=o{RESVE_ID}, INSURANCE=i{RESVE_ID}(MERITZ는 policy 기반).
        data_type: STRING
      - name: ORDER_NO
        description: "주문 번호"
        data_type: STRING
      - name: USER_ID
        description: "유저 아이디"
        data_type: STRING
      - name: KIND
        description: |
          거래 구분. 1=결제행, 2=취소행.
          거래액 조회 시 기본적으로 KIND=1(결제행)만 필터함.
          순거래액이 필요하면 KIND 1,2를 모두 포함해 합산함(취소행은 음수 금액으로 상계됨).
        data_type: INTEGER
      - name: RECENT_STATUS
        description: "최근 상태"
        data_type: STRING
      - name: DOMAIN_NM
        description: >
          도메인 명. 파이프라인 소스 구분용 컬럼으로, 버티컬 분석에는 사용하지 않음.
          버티컬 분류에는 STANDARD_CATEGORY_LV_1_CD를 사용할 것.
          값: AIR, AIR ANCILLARY, 3.0 PRODUCT, INSURANCE, OVERSEAS RENTALCAR.
        data_type: STRING
      - name: PRODUCT_ID
        description: "상품 아이디"
        data_type: STRING
      - name: GID
        description: "GID"
        data_type: STRING
      - name: GPID
        description: "GPID"
        data_type: STRING
      - name: PRODUCT_TITLE
        description: "상품 제목"
        data_type: STRING
      - name: CONFIRM_KST_DT
        description: "확정 KST 일시"
