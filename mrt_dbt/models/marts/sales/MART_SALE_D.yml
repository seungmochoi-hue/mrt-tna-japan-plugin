        data_type: INTEGER
      - name: RESVE_TYPE
        description: "예약 유형"
        data_type: STRING
      - name: ORDER_RESVE_TYPE
        description: "주문 예약 유형"
        data_type: STRING
      - name: SALE_FORM_CD
        description: "판매 형태 코드"
        data_type: STRING
      - name: SALE_FORM_TYPE
        description: "판매 형태 타입"
        data_type: STRING
      - name: SALE_AGG_TYPE
        description: "판매 집계 유형"
        data_type: STRING
      - name: BRANCH_CD
        description: "지점 코드"
        data_type: STRING
      - name: CATEGORY_NM
        description: "카테고리 명"
        data_type: STRING
      - name: CATEGORY_ID
        description: "카테고리 아이디"
        data_type: INTEGER
      - name: CATEGORY_CD
        description: "카테고리 코드"
        data_type: STRING
      - name: SUB_CATEGORY_ID
        description: "하위 카테고리 아이디"
        data_type: INTEGER
      - name: SUB_CATEGORY_CD
        description: "하위 카테고리 코드"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_1_CD
        description: |
          표준 카테고리 레벨 1 코드. 버티컬 분류의 기준 컬럼임.
          값: FLIGHT(항공), ACCOMMODATION(숙소), TOUR(투어), TICKET(티켓), ACTIVITY(액티비티),
          CONVENIENCE(여행 편의), SNAP(스냅촬영), CLASS(클래스), TRANSPORTATION_V2(교통),
          AIR_ANCILLARY(항공 부가서비스), INSURANCE(보험), PACKAGE(마이팩).
          버티컬 그룹핑:
            항공 = FLIGHT, AIR_ANCILLARY.
            T&A = TOUR, TICKET, ACTIVITY, CLASS, CONVENIENCE, SNAP.
            숙박 = ACCOMMODATION.
            마이팩(패키지) = STANDARD_CATEGORY_LV_1_CD='PACKAGE' AND STANDARD_CATEGORY_LV_2_CD IN ('PKG_TOUR','PKG_FIT','PKG_THEME','PKG_AIR','PKG_TNA','KIDS_ABROAD_PACKAGE'). 비즈니스 카테고리는 더 이상 로직 업데이트되지 않으므로 STANDARD_CATEGORY 기준으로 조회할 것.
            보험 = INSURANCE.
            교통 = TRANSPORTATION_V2.
          숙박 하위 세그먼트 — 한인 민박: STANDARD_CATEGORY_LV_1_CD='ACCOMMODATION' AND STANDARD_CATEGORY_LV_2_CD='MINBAK' AND STANDARD_CATEGORY_LV_3_CD='KOREAN_MINBAK' AND PROVIDER_CD='STAYNET'.
          현재 적재 데이터 기준 COUNTRY_NM='Korea, Republic of'는 없으며, 별도 버티컬이 아니라 숙박 내 세부 필터링 조건임.
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_1_NM
        description: "표준 카테고리 레벨 1 명"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_2_CD
        description: "표준 카테고리 레벨 2 코드"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_2_NM
