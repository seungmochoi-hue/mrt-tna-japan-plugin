        description: "수수료 금액"
        data_type: FLOAT
      - name: RESVE_PURPOSE_TYPE
        description: "예약 목적 유형"
        data_type: STRING
      - name: CHILD_RESVE_PRSNL_CNT
        description: "소아 예약 인원"
        data_type: INTEGER
      - name: ADULT_RESVE_PRSNL_CNT
        description: "성인 예약 인원"
