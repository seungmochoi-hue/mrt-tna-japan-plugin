      - name: STANDARD_CATEGORY_LV_1_CD
        description: "표준 카테고리 레벨 1 코드"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_2_CD
        description: "표준 카테고리 레벨 2 코드"
        data_type: STRING
      - name: STANDARD_CATEGORY_LV_3_CD
        description: "표준 카테고리 레벨 3 코드"
