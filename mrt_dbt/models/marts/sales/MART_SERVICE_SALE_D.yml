version: 2

models:
  - name: MART_SERVICE_SALE_D
    description: |
      2.0 플랫폼(mrt_20) 상품 판매 마트.
      원천: mrt_20.reservations/payments/offers. 레거시 상품 예약 대상.
      KIND=1 확정, KIND=2 취소(금액 음수). 테스트 유저/상품 제외.
    config:
      tags: ["MART", "SERVICE"]
    columns:
      - name: BASIS_DATE
        description: "기준 일자"
        data_type: DATE
      - name: USER_ID
        description: "유저 아이디"
        data_type: STRING
      - name: RESVE_ID
        description: "예약 아이디"
        data_type: STRING
      - name: OFFER_ID
        description: "오퍼 아이디"
        data_type: STRING
      - name: KIND
        description: "1=결제행, 2=취소행"
        data_type: INTEGER
      - name: RECENT_STATUS
        description: "최근 상태"
        data_type: STRING
      - name: CANCEL_KST_DT
        description: "취소 KST 일시"
        data_type: TIMESTAMP
      - name: CANCEL_REASON
        description: "취소 사유"
        data_type: STRING
      - name: CANCEL_SUBJECT
        description: "취소 주제"
        data_type: STRING
      - name: OFFER_TYPE
        description: "오퍼 유형"
        data_type: STRING
      - name: CREATE_KST_DT
        description: "생성 KST 일시"
        data_type: TIMESTAMP
      - name: RESVE_PAID_KST_DT
        description: "예약 결제 KST 일시"
        data_type: TIMESTAMP
      - name: RESVE_CONFIRM_KST_DT
        description: "예약 확정 KST 일시"
        data_type: TIMESTAMP
      - name: UPDATE_KST_DT
        description: "업데이트 KST 일시"
        data_type: TIMESTAMP
      - name: SALE_FORM_CD
        description: "판매 형태 코드"
        data_type: STRING
      - name: PLATFORM
        description: "플랫폼"
        data_type: STRING
      - name: TRAVEL_START_KST_DATE
        description: "여행 시작 KST 일자"
        data_type: DATE
      - name: TRAVEL_DURATION_VALUE
        description: "여행 기간 값"
        data_type: INTEGER
      - name: TRAVEL_END_KST_DATE
        description: "여행 종료 KST 일자"
        data_type: DATE
      - name: RESVE_TYPE
        description: "예약 유형"
        data_type: STRING
      - name: CATEGORY_ID
        description: "카테고리 아이디"
