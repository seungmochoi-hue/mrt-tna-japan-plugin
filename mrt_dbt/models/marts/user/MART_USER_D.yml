version: 2

models:
  - name: MART_USER_D
    description: |
      사용자 종합 마트. 기본 정보, 로그인 이력, 쿠폰 보유, 리뷰, 구매/여행 이력을 통합한 일별 스냅샷.
      EXPT_* 컬럼은 여행 종료일 >= 기준일인 미래 예정 여행 정보.
      BigQuery 물리 최적화: cluster(USER_ID)
    config:
      tags: ["MART", "USER"]
    columns:
      - name: BASIS_DT
        description: "기준 날짜"
        data_type: DATE
      - name: USER_ID
        description: "마리트 유저 아이디"
        data_type: STRING
      - name: JOIN_KST_DT
        description: "가입일시 (KST)"
        data_type: TIMESTAMP
      - name: JOIN_PLATFORM
        description: "가입 플랫폼"
        data_type: STRING
      - name: APP_INSTALL_FLAG
        description: "앱 설치 여부"
        data_type: BOOLEAN
      - name: JOIN_OAUTH_TYPE
        description: "가입 인증 플랫폼"
        data_type: STRING
      - name: LAST_LOGIN_PLATFORM
        description: "마지막 로그인 플랫폼"
        data_type: STRING
      - name: LAST_LOGIN_KST_DT
        description: "마지막 로그인 일시 (KST)"
        data_type: TIMESTAMP
      - name: DORMANT_FLAG
        description: "휴면 여부"
        data_type: BOOLEAN
      - name: DORMANT_KST_DT
        description: "휴면 전환 일자 (KST)"
        data_type: DATE
      - name: LEAVE_FLAG
        description: "탈퇴 여부"
        data_type: BOOLEAN
      - name: LEAVE_KST_DT
        description: "탈퇴 일시 (KST)"
        data_type: TIMESTAMP
      - name: SMS_RECV_AGREE
        description: "SMS 수신 동의 여부"
        data_type: BOOLEAN
      - name: PUSH_RECV_AGREE
        description: "PUSH 수신 동의 여부"
        data_type: BOOLEAN
      - name: MAIL_RECV_AGREE
        description: "메일 수신 동의 여부"
        data_type: BOOLEAN
      - name: POSITION_ARGREEMENT_FLAG
        description: "위치 정보 제공 동의 여부"
        data_type: BOOLEAN
      - name: PHONE_VALID_FLAG
        description: "휴대폰 인증 여부"
        data_type: BOOLEAN
      - name: REP_AGE
        description: "대표 출생년도. 항공 예약 승객 정보 기반 추정값"
        data_type: STRING
      - name: USER_GENDER_NM
        description: "대표 성별(M/F). 항공 예약 승객 정보 기반"
        data_type: STRING
      - name: COMPANION_AGE_GENDER_GROUP
        description: "동반 탑승자 출생년도-성별 조합. 항공 예약 기반 (예: 1990-M,1985-F)"
        data_type: STRING
      - name: GUIDE_FLAG
        description: "파트너(가이드) 여부"
        data_type: BOOLEAN
      - name: MRT_STAFF_FLAG
        description: "마이리얼트립 직원 여부"
        data_type: BOOLEAN
      - name: TEST_FLAG
