version: 2

sources:
  - name: "log"
    database: "mrtdata"
    schema: "edw"
    tables:
      - name: "biz_log"
        identifier: "DW_BIZ_LOG"
        description: "biz log 테이블"
        columns:
          - name: "basis_dt"
            description: "기준 날짜(event_timestamp_kst) *필수 조건*"
          - name: "event_timestamp"
            description: "이벤트 발생시간(client) - UTC 기준"
          - name: "event_timestamp_kst"
            description: "이벤트 발생시간(client) - KST 기준"
          - name: "received_timestamp"
            description: "이벤트 서버 도착 시간 - UTC 기준"
          - name: "received_timestamp_kst"
            description: "이벤트 서버 도착 시간 - KST 기준"
          - name: "platform"
            description: "이벤트 발생 플랫폼"
          - name: "session_id"
            description: "사용자 구분 ID(행동 없을시 30분 기준)"
          - name: "pid"
            description: "사용자 구분 ID(임의 부여 ID - 쿠키 삭제까지 유효)"
          - name: "udid"
            description: "사용자 ID(기기 고유 ID)"
          - name: "adid"
            description: "광고 ID"
          - name: "user_id"
            description: "마리트 유저 ID"
          - name: "client_ip"
            description: "Client IP"
          - name: "event_type"
            description: "이벤트 타입"
          - name: "screen_name"
            description: "이벤트 발생 화면 이름"
          - name: "event_name"
            description: "이벤트 이름"
          - name: "event_key"
            description: "이벤트 키(동일 화면에서 발생하는 이벤트 구분 키)"
          - name: "url"
            description: "이벤트 발생 URL(Data 기본 추출)"
          - name: "ref_url"
            description: "이벤트 발생 이전 URL(Data 기본 추출)"
          - name: "abtest"
            description: "AB Test 구분 키(Data 기본 추출)"
          - name: "page_category"
            description: "Page Category 값(Data 기본 추출)"
          - name: "item_kind"
            description: "아이템 종류(Data 기본 추출)"
          - name: "item_id"
            description: "아이템 ID(Data 기본 추출)"
          - name: "item_category"
            description: "아이템 Category(Data 기본 추출)"
          - name: "item_name"
            description: "아이템 이름(Data 기본 추출)"
          - name: "item_type"
            description: "아이템 타입(Data 기본 추출)"
          - name: "ds"
            description: "Data 컬럼 추출 모음(로그 마스터에 정의된 추출)"
          - name: "data"
            description: "Data"
          - name: "utm"
            description: "광고 정보"
          - name: "geo"
            description: "위치 정보"
          - name: "device"
            description: "기기 정보"
          - name: "ua"
            description: "브라우저 정보(추측 값)"
          - name: "dw_load_dt"
            description: "적재 시간"
