version: 2

sources:
  - name: "log_stream"
    database: "mrtdata"
    schema: "edw_stream"
    tables:
      - name: "biz_log"
        identifier: "biz_log"
        description: "stream biz log 테이블"
        columns:
          - name: "basis_dt"
            description: "Basis Date"
          - name: "received_timestamp"
            description: "Received Timestamp"
          - name: "event_timestamp"
            description: "Event Timestamp"
          - name: "screen_name"
            description: "Screen Name"
          - name: "event_type"
            description: "Event Type"
          - name: "event_name"
            description: "Event Name"
          - name: "platform"
            description: "Platform"
          - name: "pid"
            description: "Pid"
          - name: "udid"
            description: "Udid"
          - name: "adid"
            description: "Adid"
          - name: "user_id"
            description: "사용자 ID"
          - name: "lib_version"
            description: "Lib Version"
          - name: "client_ip"
            description: "Client Ip"
          - name: "session_id"
            description: "Session ID"
          - name: "session_timestamp"
            description: "Session Timestamp"
          - name: "event_key"
            description: "Event Key"
          - name: "data"
            description: "Data"
          - name: "utm"
            description: "UTM"
          - name: "geo"
            description: "Geo"
          - name: "device"
            description: "Device"
