version: 2

sources:
  - name: "cartographer"
    database: "mrtdata"
    schema: "edw"
    tables:
      - name: "region"
        identifier: "DW_MRT_CARTOGRAPHER_REGION"
        description: "cartographer region 마스터 source 테이블임. region_id 기준 영문 지역명(en_name), 지역 유형(type), 국가 코드(iso_code), 삭제 여부(deleted_at) 값을 포함함."
        columns:
          - name: "region_id"
            description: "Region ID"
          - name: "name"
            description: "Name"
          - name: "en_name"
            description: "En Name"
          - name: "name_full"
            description: "Name Full"
          - name: "en_name_full"
            description: "En Name Full"
          - name: "descriptor"
            description: "Descriptor"
          - name: "type"
            description: "Type"
          - name: "center_longitude"
            description: "Center Longitude"
          - name: "center_latitude"
            description: "Center Latitude"
          - name: "status"
            description: "상태"
          - name: "iso_code"
            description: "Iso Code"
          - name: "created_at"
            description: "생성일시"
          - name: "created_by"
            description: "생성자"
          - name: "updated_at"
            description: "수정일시"
          - name: "updated_by"
            description: "수정자"
          - name: "deleted_at"
            description: "삭제일시"
          - name: "deleted_by"
            description: "Deleted By"
          - name: "timezone_id"
            description: "Timezone ID"
          - name: "interest"
            description: "Interest"
          - name: "dw_load_dt"
            description: "DW 적재 일시"
