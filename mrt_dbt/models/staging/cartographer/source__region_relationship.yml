version: 2

sources:
  - name: "cartographer"
    database: "mrtdata"
    schema: "edw"
    tables:
      - name: "region_relationship"
        identifier: "DW_MRT_CARTOGRAPHER_REGION_RELATIONSHIP"
        description: "cartographer region 간 관계를 저장하는 source 테이블임. region_id 와 relationship_region_id 간 연결, 관계 방향(relationship), 관계 유형(type), 대표 여부(main_yn), 삭제 여부(deleted_at) 값을 포함함."
        columns:
          - name: "id"
            description: "ID"
          - name: "region_id"
            description: "Region ID"
          - name: "type"
            description: "Type"
          - name: "relationship_region_id"
            description: "Relationship Region ID"
          - name: "relationship"
            description: "Relationship"
          - name: "created_at"
            description: "생성일시"
          - name: "created_by"
            description: "생성자"
          - name: "updated_at"
            description: "수정일시"
          - name: "updated_by"
            description: "수정자"
          - name: "deleted_at"
            description: "삭제일시"
          - name: "deleted_by"
            description: "Deleted By"
          - name: "main_yn"
            description: "Main YN"
          - name: "dw_load_dt"
            description: "DW 적재 일시"
