version: 2
sources:
- name: commons
  database: mrtdata
  schema: edw
  tables:
  - name: short_url
    identifier: DW_MRT_COMMONS_SHORT_URL
    description: Short URL. 하위 모델 DIM_MYLINK_D, MART_MYLINK_CONVERSION_AGG_D, MART_MYLINK_REFER_D에서 사용함.
    columns:
    - name: id
      description: Sequential ID
    - name: hash
      description: Web URL의 MD5 해시
    - name: target_url_web
      description: 이동할 URL (web)
    - name: target_url_mobile
      description: 이동할 URL (mobile)
    - name: purpose
      description: 용도/목적
    - name: gid
      description: 상품 ID
    - name: deleted
      description: 삭제 여부
    - name: created_at
      description: 생성일시
    - name: created_by
      description: 생성자
    - name: updated_at
      description: 수정일시
    - name: updated_by
      description: 수정자
    - name: deleted_at
      description: 삭제일시
    - name: deleted_by
      description: 삭제자
    - name: expire_at
      description: 만료일
    - name: dw_load_dt
      description: DW 적재 일시
    - name: code
      description: Short URL 코드
    - name: start_at
      description: 시작일
