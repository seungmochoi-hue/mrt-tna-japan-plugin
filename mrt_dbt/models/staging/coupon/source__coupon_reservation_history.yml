version: 2

sources:
  - name: "coupon"
    database: "mrtdata"
    schema: "edw"
    description: |
      쿠폰 도메인 원천 테이블. 개별 쿠폰 추적 기준은 coupon_user_mapping.id. coupon_templates / coupon_user_mapping / coupon_use_history / coupon_reservation_history 조합으로 지급, 사용, 예약을 연결한다.
    tables:
      - name: "coupon_reservation_history"
        identifier: "DW_MRT_COUPONS_COUPON_RESERVATION_HISTORY"
        description: "쿠폰 예약 연결 이력"
        columns:
          - name: "id"
            description: "ID"
          - name: "order_no"
            description: "주문번호"
          - name: "reservation_no"
            description: "예약번호"
          - name: "order_refund_id"
            description: "주문 환불 ID"
          - name: "reservation_refunds_id"
            description: "Reservation Refunds ID"
          - name: "sale_price"
            description: "판매 금액"
          - name: "discount_target_amount"
            description: "Discount Target Amount"
          - name: "discount_amount"
            description: "할인 금액"
          - name: "mrt_contribution_rate"
            description: "MRT 분담 비율"
          - name: "partner_contribution_rate"
            description: "파트너 분담 비율"
          - name: "template_id"
            description: "템플릿 ID"
          - name: "coupon_user_mapping_id"
            description: "쿠폰 지급 ID"
          - name: "user_id"
            description: "유저 ID"
          - name: "template_partner_id"
            description: "Template Partner ID"
          - name: "created_at"
            description: "생성일시"
          - name: "created_by"
            description: "생성자"
          - name: "updated_at"
            description: "수정일시"
          - name: "updated_by"
            description: "수정자"
          - name: "deleted_at"
            description: "삭제일시"
          - name: "usable_type"
            description: "Usable Type"
          - name: "dw_load_dt"
            description: "DW 적재 일시"
