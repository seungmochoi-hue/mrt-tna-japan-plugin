version: 2

sources:
  - name: "coupon"
    database: "mrtdata"
    schema: "edw"
    description: |
      쿠폰 도메인 원천 테이블. 개별 쿠폰 추적 기준은 coupon_user_mapping.id. coupon_templates / coupon_user_mapping / coupon_use_history / coupon_reservation_history 조합으로 지급, 사용, 예약을 연결한다.
    tables:
      - name: "coupon_templates"
        identifier: "DW_MRT_COUPONS_COUPON_TEMPLATES"
        description: "쿠폰 템플릿 마스터"
        columns:
          - name: "id"
            description: "템플릿 ID"
            tests:
              - not_null
              - unique
          - name: "name"
            description: "쿠폰 템플릿 이름"
          - name: "promotion_code"
            description: "프로모션 코드"
          - name: "purpose"
            description: "Purpose"
          - name: "description"
            description: "Description"
          - name: "is_usable"
            description: "Is Usable"
          - name: "is_publishable"
            description: "Is Publishable"
          - name: "expire_period_type"
            description: "Expire Period Type"
          - name: "start_use_date"
            description: "Start Use Date"
          - name: "expire_date"
            description: "Expire Date"
          - name: "expire_period"
            description: "Expire Period"
          - name: "discount_type"
            description: "할인 유형"
          - name: "coupon_type"
            description: "Coupon Type"
          - name: "activated_start_date"
            description: "Activated Start Date"
          - name: "activated_end_date"
            description: "Activated End Date"
          - name: "is_expire_alarm"
            description: "Is Expire Alarm"
          - name: "expire_alarm_day"
            description: "Expire Alarm Day"
          - name: "is_repeatable"
            description: "Is Repeatable"
