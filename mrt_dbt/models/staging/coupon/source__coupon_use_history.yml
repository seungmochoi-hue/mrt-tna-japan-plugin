version: 2

sources:
  - name: "coupon"
    database: "mrtdata"
    schema: "edw"
    description: |
      쿠폰 도메인 원천 테이블. 개별 쿠폰 추적 기준은 coupon_user_mapping.id. coupon_templates / coupon_user_mapping / coupon_use_history / coupon_reservation_history 조합으로 지급, 사용, 예약을 연결한다.
    tables:
      - name: "coupon_use_history"
        identifier: "DW_MRT_COUPONS_COUPON_USE_HISTORY"
        description: "쿠폰 사용/취소 이력"
        columns:
          - name: "id"
            description: "ID"
          - name: "coupon_user_mapping_id"
            description: "쿠폰 지급 ID"
          - name: "action_type"
            description: "액션 유형"
          - name: "order_no"
            description: "주문번호"
          - name: "reservation_no"
            description: "예약번호"
          - name: "coupon_target_amount"
            description: "Coupon Target Amount"
          - name: "discount_amount"
            description: "할인 금액"
          - name: "created_at"
            description: "생성일시"
          - name: "created_by"
            description: "생성자"
          - name: "updated_at"
            description: "수정일시"
          - name: "updated_by"
            description: "수정자"
          - name: "deleted_at"
            description: "삭제일시"
          - name: "deleted_by"
            description: "Deleted By"
          - name: "order_type"
            description: "주문 유형"
          - name: "coupon_target_quantity"
            description: "Coupon Target Quantity"
          - name: "action_type_reference_key"
            description: "Action Type Reference Key"
          - name: "usable_type"
            description: "Usable Type"
          - name: "dw_load_dt"
            description: "DW 적재 일시"
