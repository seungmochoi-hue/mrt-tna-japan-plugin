version: 2

sources:
  - name: "coupon"
    database: "mrtdata"
    schema: "edw"
    description: |
      쿠폰 도메인 원천 테이블. 개별 쿠폰 추적 기준은 coupon_user_mapping.id. coupon_templates / coupon_user_mapping / coupon_use_history / coupon_reservation_history 조합으로 지급, 사용, 예약을 연결한다.
    tables:
      - name: "coupon_user_mapping"
        identifier: "DW_MRT_COUPONS_COUPON_USER_MAPPING"
        description: "유저별 쿠폰 지급 이력"
        columns:
          - name: "id"
            description: "쿠폰 지급 ID"
          - name: "template_id"
            description: "템플릿 ID"
          - name: "coupon_name"
            description: "Coupon Name"
          - name: "user_id"
            description: "유저 ID"
          - name: "user_name"
            description: "User Name"
          - name: "user_email"
            description: "User Email"
          - name: "use_status"
            description: "사용 상태"
          - name: "promotion_code"
            description: "Promotion Code"
          - name: "redeem_code"
            description: "Redeem Code"
          - name: "start_use_date"
            description: "Start Use Date"
          - name: "expire_date"
            description: "Expire Date"
          - name: "coupon_type"
            description: "쿠폰 유형"
          - name: "discount_type"
            description: "할인 유형"
          - name: "flat_amount"
            description: "정액 할인 금액"
          - name: "discount_rate"
            description: "정률 할인율"
          - name: "min_product_amount"
            description: "Min Product Amount"
          - name: "max_discount_amount"
            description: "Max Discount Amount"
          - name: "extended_expired_count"
            description: "Extended Expired Count"
          - name: "is_reserved"
            description: "Is Reserved"
          - name: "is_used"
            description: "Is Used"
          - name: "used_at"
            description: "사용 일시"
          - name: "canceled_at"
            description: "취소 일시"
          - name: "is_mig"
            description: "Is Mig"
          - name: "mig_coupon_id"
            description: "Mig Coupon ID"
          - name: "mig_created_at"
            description: "Mig Created At"
          - name: "created_at"
            description: "생성일시"
          - name: "created_by"
            description: "생성자"
          - name: "updated_at"
            description: "수정일시"
          - name: "updated_by"
            description: "수정자"
          - name: "deleted_at"
            description: "삭제일시"
          - name: "deleted_by"
            description: "Deleted By"
          - name: "published_at"
            description: "Published At"
          - name: "retrieve_reason"
            description: "Retrieve Reason"
          - name: "use_limit_type"
            description: "Use Limit Type"
          - name: "min_product_quantity"
            description: "Min Product Quantity"
          - name: "order_no"
            description: "주문번호"
          - name: "reservation_no"
            description: "예약번호"
          - name: "order_type"
            description: "Order Type"
          - name: "partner_contribution_rate"
            description: "Partner Contribution Rate"
          - name: "mrt_contribution_rate"
            description: "MRT Contribution Rate"
          - name: "discount_amount"
            description: "Discount Amount"
