version: 2

sources:
  - name: "experiences"
    database: "mrtdata"
    schema: "edw"
    tables:
      - name: "product_regions"
        identifier: "DW_MRT_EXPERIENCES_PRODUCT_REGIONS"
        description: "상품 서비스 장소 정보. 좌표/설명/이미지. 상품당 1건(1:1)"
        columns:
          - name: "id"
            description: "PK"
          - name: "created_at"
            description: "생성일시"
          - name: "created_by"
            description: "생성자"
          - name: "deleted_at"
            description: "삭제일시"
          - name: "deleted_by"
            description: "삭제자"
          - name: "updated_at"
            description: "수정 시각 (파티션 키, DAY)"
          - name: "updated_by"
            description: "수정자"
          - name: "description"
            description: "장소 설명 (자유 텍스트)"
          - name: "image_url"
            description: "장소 이미지 URL. 대부분 NULL"
          - name: "input_method"
            description: "입력 방식. CUSTOM/COORDINATES"
          - name: "label"
            description: "장소명"
          - name: "latitude"
            description: "위도"
          - name: "longitude"
            description: "경도"
          - name: "region_meta_id"
            description: "지역 메타 테이블 FK. NULL 가능"
          - name: "region_type"
            description: "지역 유형. 현재 SERVICE_PLACE 단일값"
          - name: "product_id"
            description: "FK. products.id 참조 (1:1 매핑)"
          - name: "dw_load_dt"
            description: "DW 적재 시각"
