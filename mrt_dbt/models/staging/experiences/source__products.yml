version: 2

sources:
  - name: "experiences"
    database: "mrtdata"
    schema: "edw"
    tables:
      - name: "products"
        identifier: "DW_MRT_EXPERIENCES_PRODUCTS"
        description: "T&A 3.0 상품 마스터. integration_type으로 자체(STORE)/연동사(SUPPLIER) 구분"
        columns:
          - name: "id"
            description: "PK. 상품 ID (GID)"
          - name: "created_at"
            description: "생성 시각"
          - name: "created_by"
            description: "생성자"
          - name: "deleted_at"
            description: "삭제 시각 (soft delete)"
          - name: "deleted_by"
            description: "삭제자"
          - name: "updated_at"
            description: "수정 시각 (파티션 키, DAY)"
          - name: "updated_by"
            description: "수정자"
          - name: "contact_enabled"
            description: "문의하기 가능 여부"
          - name: "duration"
            description: "소요 시간 (분 단위)"
          - name: "estimate_enabled"
            description: "견적서 가능 여부"
          - name: "external_url_enabled"
            description: "외부 URL 가능 여부"
          - name: "first_published_at"
            description: "최초 온세일 날짜. 미판매 상품은 NULL"
          - name: "first_standard_category"
            description: "1차 표준 카테고리. TOUR/TICKET/ACTIVITY/CONVENIENCE/CLASS/SNAP"
          - name: "image_consent"
            description: "이미지 동의 여부"
          - name: "integration_type"
            description: "연동 유형. STORE=자체 상품, SUPPLIER=연동사 상품"
          - name: "languages"
            description: "사용 가능 언어 (JSON 배열)"
          - name: "latest_published_at"
            description: "최근 온세일 날짜"
          - name: "partner_id"
            description: "파트너 ID"
          - name: "search_keywords"
            description: "검색 키워드"
          - name: "status"
            description: "상품 상태. ONSALE/HOLD/TEMP/REJECT/DELETED/READY_FOR_ONSALE/IN_REVIEW/NOT_FOR_SALE"
          - name: "submitted_at"
            description: "심사 요청 날짜"
          - name: "standard_category"
            description: "3차 표준 카테고리 (세부). PRIVATE_TOUR, HOPPING_TOUR 등"
          - name: "title"
            description: "상품명"
          - name: "transport"
            description: "이동수단"
          - name: "dw_load_dt"
            description: "DW 적재 시각"
          - name: "external_connectors"
            description: "External Connectors"
