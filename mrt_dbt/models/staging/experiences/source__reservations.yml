version: 2

sources:
  - name: "experiences"
    database: "mrtdata"
    schema: "edw"
    tables:
      - name: "reservations"
        identifier: "DW_MRT_EXPERIENCES_RESERVATIONS"
        description: "T&A 3.0 예약 원장. MART_SALE_D.RESVE_ID와 reservation_no로 조인. 연동사 상품은 product_type=SUPPLIER이며 stocks 테이블에 판매 기록 없음(NOT_MANAGED). 옵션 상세는 supplier_option_reservations와 id로 조인"
        columns:
          - name: "id"
            description: "PK"
          - name: "created_at"
            description: "생성 시각"
          - name: "created_by"
            description: "생성자"
          - name: "deleted_at"
            description: "삭제 시각 (soft delete)"
          - name: "deleted_by"
            description: "삭제자"
          - name: "updated_at"
            description: "수정 시각 (파티션 키, DAY)"
          - name: "updated_by"
            description: "수정자"
          - name: "refund_policies"
            description: "환불 정책"
          - name: "refund_template_code"
            description: "환불 템플릿 코드"
          - name: "refund_template_enabled"
            description: "환불 템플릿 활성화 여부"
          - name: "sale_commission"
            description: "판매 수수료 금액"
          - name: "sale_commission_policy_id"
            description: "수수료 정책 ID"
          - name: "sale_commission_rate"
            description: "수수료율"
          - name: "confirmed_at"
            description: "예약 확정 시각 (STRING 타입)"
          - name: "option_id"
            description: "옵션 ID. 연동사 상품은 -1"
          - name: "option_unit_item_ids"
            description: "옵션 유닛 아이템 ID 목록"
          - name: "option_price_adjustment_id"
            description: "옵션 가격 조정 ID"
          - name: "option_reservation_id"
            description: "옵션 예약 ID"
          - name: "option_title"
            description: "옵션 카테고리명 (성인, 아동 등). 인원 유형 수준"
          - name: "first_standard_category"
            description: "1차 표준 카테고리"
          - name: "product_no"
            description: "상품번호 (INTEGER)"
          - name: "product_title"
            description: "상품명"
          - name: "third_standard_category"
            description: "3차 표준 카테고리"
          - name: "product_type"
            description: "상품 유형. SUPPLIER=연동사 상품"
          - name: "reservation_confirm_type"
            description: "예약 확정 유형"
          - name: "reservation_no"
            description: "예약번호. MART_SALE_D.RESVE_ID와 조인 키 (EXP-YYYYMMDD-NNNNN)"
          - name: "reserved_at"
            description: "예약 시각 (STRING 타입)"
          - name: "sale_price"
            description: "판매가 (STRING 타입, CAST 필요)"
          - name: "status"
            description: "예약 상태. CONFIRM/FINISH/WAIT_CONFIRM/WAIT_DEPOSIT/TEMP/CANCEL/REQUEST_CANCEL 등"
          - name: "is_overbooked"
            description: "오버부킹 여부"
          - name: "is_stock_allocated"
            description: "재고 할당 여부"
          - name: "overbooking_availability"
            description: "오버부킹 가용성"
          - name: "quantity"
            description: "수량"
          - name: "stock_id"
            description: "재고 ID"
          - name: "stock_manage_type"
            description: "재고 관리 유형. NOT_MANAGED=연동사(재고 미관리)"
          - name: "trip_started_date"
            description: "여행 시작일 (STRING, YYYY-MM-DD)"
          - name: "is_estimate"
            description: "견적 여부"
          - name: "sales_channel_type"
            description: "판매 채널 유형"
          - name: "dw_load_dt"
            description: "DW 적재 시각"
