version: 2

models:
  - name: FPNA_PG_INFO
    description: "결제수단별 PG 수수료/정액 비용 정보. 원천: external_business.FPNA_PG_INFO (BigQuery 적재 위치: edw_ext.FPNA_PG_INFO)."
    config:
      meta:
        owner: "FPNA"
    columns:
      - name: PAYMENT_METHOD
        description: "결제 수단"
        data_type: STRING
      - name: PG_COM_RATE
        description: "PG 수수료율. external_business.FPNA_PG_INFO에서 PG사/기간별로 관리되며 edw_ext.FPNA_PG_INFO로 적재."
        data_type: FLOAT64
      - name: PG_COM_AMOUNT
        description: "PG 수수료 정액(금액)"
        data_type: INT64
      - name: START_DATE
        description: "적용 시작일"
        data_type: DATE
      - name: END_DATE
        description: "적용 종료일"
        data_type: DATE

