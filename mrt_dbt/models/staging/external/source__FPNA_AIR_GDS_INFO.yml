version: 2

sources:
  - name: "external_business"
    database: "mrtdata"
    schema: "business"
    description: "외부데이터 ( 스프레드 시트 등 )"
    tables:
      - name: "FPNA_AIR_GDS_INFO"
        identifier: "FPNA_AIR_GDS_INFO"
        description: "항공 - GDS VI 관리 시트 (스프레드시트관리)"
        columns:
          - name: "basis_date"
            description: "기준 날짜"
          - name: "AIRLINE_TYPE"
            description: "항공사 타입"
          - name: "seg"
            description: "세그먼트"
          - name: "SEG_TYPE"
            description: "세그먼트 타입"
          - name: "SEG_TYPE_USD_AMOUNT"
            description: "세그먼트 타입 USD 금액"
          - name: "GDS_VI_COM_USD"
            description: "GDS VI COM USD 금액"
          - name: "CURRENCY_RATE"
            description: "환율"
          - name: "GDS_VI_COM_KRW_WO_VAT"
            description: "GDS VI COM KRW (VAT 제외)"
          - name: "SEG_ADJUSTED"
            description: "세그먼트 조정"
