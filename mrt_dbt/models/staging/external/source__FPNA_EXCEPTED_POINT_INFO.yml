            description: "템플릿 ID"
          - name: "template_name"
            description: "템플릿 이름"
          - name: "mrt_value_rate"
            description: "MRT 가치 환산 비율"
          - name: "remark_1"
            description: "비고 1"
          - name: "remark_2"
            description: "비고 2"
          - name: "remark_3"
            description: "비고 3"
