version: 2

sources:
  - name: "external_business"
    database: "mrtdata"
    schema: "business"
    description: "외부데이터 ( 스프레드 시트 등 )"
    tables:
      - name: "FPNA_TICKETLODGING_INFO"
        identifier: "FPNA_TICKETLODGING_INFO"
        description: "티켓/숙박권 프로모션 정산/수수료(테이크레이트) 관리 정보"
        columns:
          - name: "PROMOTION_NO"
            description: "프로모션 번호"
          - name: "ACCOUNT_NAME"
            description: "계정(어카운트) 이름"
          - name: "OSP_ID"
            description: "OSP ID"
          - name: "OSP_NM"
            description: "OSP 이름"
          - name: "GID"
            description: "상품 GID"
          - name: "SETTLE_TYPE"
            description: "정산 타입"
          - name: "MRT_TAKE_RATE"
            description: "MRT take rate"
          - name: "OPEN_DATE"
            description: "오픈 일자"
          - name: "CLOSE_DATE"
            description: "종료 일자"
          - name: "ACCOUNT_TYPE"
            description: "계정 타입"
          - name: "PROMOTION_TYPE"
            description: "프로모션 타입"
          - name: "STATUS"
            description: "상태"
