version: 2

sources:
  - name: "external_business"
    database: "mrtdata"
    schema: "business"
    description: "외부데이터 ( 스프레드 시트 등 )"
    tables:
      - name: "FPNA_TNA_COMMISSION_RATE_INFO"
        identifier: "FPNA_TNA_COMMISSION_RATE_INFO"
        description: "T&A 손익 관리 (스프레드시트관리)"
        columns:
          - name: "partner_id"
            description: "파트너 ID"
          - name: "partner_nm"
            description: "파트너 이름"
          - name: "product_id"
            description: "상품 ID"
          - name: "product_nm"
            description: "상품 이름"
          - name: "option_id"
            description: "옵션 ID"
          - name: "option_nm"
            description: "옵션 이름"
          - name: "net_price_amount"
            description: "순수익 금액"
          - name: "commission_rate"
            description: "커미션 비율"
          - name: "start_date"
            description: "시작 날짜"
          - name: "end_date"
            description: "종료 날짜"
          - name: "remark"
            description: "비고"
