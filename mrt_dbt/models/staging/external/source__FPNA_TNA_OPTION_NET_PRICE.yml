version: 2

sources:
  - name: "external_business"
    database: "mrtdata"
    schema: "business"
    description: "외부데이터 ( 스프레드 시트 등 )"
    tables:
      - name: "FPNA_TNA_OPTION_NET_PRICE"
        identifier: "FPNA_TNA_OPTION_NET_PRICE"
        description: "TNA 손익 관리 (스프레드 시트 관리)"
        columns:
          - name: "option_id"
            description: "옵션 ID"
          - name: "option_nm"
            description: "옵션 이름"
          - name: "net_price_amount"
            description: "순수익 금액"
          - name: "commission_rate"
            description: "커미션 비율"
          - name: "start_date"
            description: "시작 날짜"
          - name: "end_date"
            description: "종료 날짜"
          - name: "remark"
            description: "비고"
