version: 2

sources:
  - name: "external"
    database: "mrtdata"
    schema: "edw"
    description: "외부데이터 ( 스프레드시트 등 )"
    tables:
      - name: "chubb_policylist"
        identifier: "DW_MRT_CHUBB_POLICYLIST"
        description: "CHUBB 보험 증권 목록"
        columns:
          - name: "productName"
            description: "상품명"
          - name: "insuredPlan"
            description: "플랜명"
          - name: "status"
            description: "상태"
          - name: "appDate"
            description: "청약일"
          - name: "updateDate"
            description: "변경/취소일"
          - name: "sellerId"
            description: "담당자 ID"
          - name: "groupName"
            description: "대리점"
          - name: "totalPremium"
            description: "총보험료"
          - name: "policyStartDate"
            description: "보험시작일자"
          - name: "policyEndDate"
            description: "보험종료일자"
          - name: "policyPeriod"
            description: "보험기간"
          - name: "insuredNum"
            description: "총인원"
          - name: "registerNo"
            description: "추가정보1(PNR_SEQNO)"
          - name: "registerId"
            description: "추가정보2(USER_ID)"
          - name: "registerPid"
            description: "추가정보3(LOG_PID)"
          - name: "countryCode"
            description: "국가코드"
          - name: "travelPlace"
            description: "여행지"
          - name: "policyUniqNo"
            description: "고유번호(증권번호 대체번호)"
          - name: "DW_LOAD_DT"
            description: "DW_적재_일시"
          - name: "basis_dt"
            description: "기준_일자"
