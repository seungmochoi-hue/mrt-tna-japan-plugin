version: 2

sources:
  - name: "localstay"
    database: "mrtdata"
    schema: "edw"
    tables:
      - name: "hotel_reservupdate_detail"
        identifier: "DW_HOTEL_HOTEL_RESERVUPDATE_DETAIL"
        description: "호텔 예약 변경 상세"
        columns:
          - name: "id"
            description: "일련번호"
          - name: "history_id"
            description: "호텔 예약데이터 조회 이력 id(hotel_reservupdate_history.id)"
          - name: "ota_id"
            description: "제휴사 구분자"
          - name: "created_at"
            description: "최초 생성시간"
          - name: "created_at_kst"
            description: "Created At Kst"
          - name: "updated_at"
            description: "최종 수정시간"
          - name: "updated_at_kst"
            description: "Updated At Kst"
          - name: "reserv_id"
            description: "OTA별 예약 아이디"
          - name: "reserv_date"
            description: "예약일자"
          - name: "reserv_date_kst"
            description: "Reserv Date Kst"
          - name: "last_modified"
            description: "마지막 업데이트일시. 중복 이력이 있어 확인하기 위해 저장"
          - name: "last_modified_kst"
            description: "Last Modified Kst"
          - name: "status"
            description: "상태값. 제휴사별 상이"
          - name: "user_id"
            description: "마리트 아이디"
          - name: "country"
            description: "예약 국가. 예약한 호텔이 위치한 국가"
          - name: "city"
            description: "예약 도시. 예약한 호텔이 위치한 도시"
          - name: "hotel_id"
            description: "OTA별 호텔ID"
          - name: "title"
            description: "숙소명"
          - name: "type"
            description: "숙소 타입"
          - name: "check_in"
            description: "체크인"
          - name: "check_out"
            description: "체크아웃"
          - name: "travel_nights"
            description: "여행박수. 체크아웃 - 체크인"
          - name: "booking_window"
            description: "리드타임. 체크인 - 예약일자"
          - name: "ttv"
            description: "총 거래액(현지). 제휴사별로 통화 상이"
          - name: "ttv_currency"
            description: "총 거래액 통화"
          - name: "ttv_won"
            description: "총 거래액(원화). API에서 제공하지 않으면 지정된 통화로 계산"
          - name: "coupon"
            description: "쿠폰사용여부"
          - name: "platform"
            description: "사용기기"
          - name: "affiliate"
            description: "제휴사명(고정값)"
          - name: "campaign"
            description: "캠페인명/숫자"
          - name: "dw_load_dt"
            description: "DW 적재 일시"
