version: 2

sources:
  - name: "localstay"
    database: "mrtdata"
    schema: "edw"
    tables:
      - name: "lodging"
        identifier: "DW_MRT_LOCALSTAY_LODGING"
        description: "로컬스테이 숙소 마스터"
        columns:
          - name: "lodging_id"
            description: "국내숙소 3.0 숙소 키값. ups gid 값 저장"
          - name: "gds_pid"
            description: "gds id. 온다값 저장"
          - name: "osp_id"
            description: "OSP id. 온다값 저장"
          - name: "name"
            description: "입점사별 지정한 숙소 이름. 온다값 저장"
          - name: "osp_name"
            description: "osp 이름. 온다값 저장"
          - name: "partner_id"
            description: "파트너 id"
          - name: "city"
            description: "도시 정보. ex) 서귀포시. 온다값 저장"
          - name: "mrt_city_key_name"
            description: "마리트도시 key name (검색추천에서join 하여사용)"
          - name: "country"
            description: "국가정보. ex) KR. 온다값 저장"
          - name: "detailed_address"
            description: "상세 주소 정보. 온다값 저장"
          - name: "latitude"
            description: "위도/경도. 온다값 저장"
          - name: "longitude"
            description: "위도/경도. 온다값 저장"
          - name: "region"
            description: "지역정보. ex) 제주. 온다값 저장"
          - name: "street_address"
            description: "상세 주소 정보. 온다값 저장"
          - name: "zip_code"
            description: "우편 번호. ex) 63629. 온다값 저장"
          - name: "biz_reg_code"
            description: "대국민 숙박대전 참여 필요 사업자 등록번호"
          - name: "confirm_type"
            description: "예약 확정 방식. [immediately, property_confirm]. 온다값 저장"
          - name: "description"
            description: "숙소 설명. 온다 api 기준 descriptions > property. 온다값 저장"
          - name: "dgm_coupon_applicable"
            description: "대국민 쿠폰 적용 여부"
          - name: "email"
            description: "숙소 대표 이메일주소"
          - name: "classifications"
            description: "숙소 분류 코드. 온다값을 코드로 정의해 저장"
          - name: "properties"
            description: "숙소 특징(속성) 코드. 온다값을 코드로 정의해 저장"
          - name: "attractions"
            description: "숙소 주변 관광지 코드. 온다값을 코드로 정의해 저장"
          - name: "facilities"
            description: "숙소 시설 코드. 온다값을 코드로 정의해 저장"
          - name: "services"
            description: "숙소 제공 서비스 코드. 온다값을 코드로 정의해 저장"
          - name: "give_rentacar_coupon"
            description: "렌터카 쿠폰 제공 여부"
          - name: "hotel_benefit"
            description: "호텔 혜택 제공여부(현재 미사용)"
          - name: "main_img_url"
            description: "숙소 대표이미지 URL"
          - name: "phone"
            description: "숙소 대표 전화번호"
          - name: "main_phone"
            description: "마리트에서 관리할 숙소의 대표 전화번호"
          - name: "price_guarantee"
            description: "최저가 보장제 여부"
          - name: "checkin_time"
            description: "체크인 시간"
          - name: "checkout_time"
            description: "체크아웃 시간"
          - name: "reserv_desciption"
            description: "숙소 예약 설명. 온다 api 기준 descriptions > reservation. 온다값 저장"
          - name: "star"
            description: "숙소 등급. 등급이 없으면 0 저장. 온다값 저장"
          - name: "onda_status"
            description: "온다 기준 숙소 상태. [ENABLED, DISABLED]"
          - name: "mrt_status"
            description: "마리트 제어 숙소 상태.  [ENABLED, DISABLED]"
          - name: "vendor_id"
            description: "공급사 id. 온다값 저장"
          - name: "vendor_name"
            description: "공급사 이름. 온다값 저장"
          - name: "vendor_pid"
            description: "공급사별 숙소 id. 온다값 저장"
          - name: "weight"
            description: "정렬 점수 계산 위한 가중치"
          - name: "b2b"
            description: "B2B 상품여부"
          - name: "affiliate_type"
            description: "B2B 상품인 경우, 법인코드(SAMSUNG)"
          - name: "created_at"
            description: "생성일시"
          - name: "created_by"
            description: "생성 주체"
          - name: "updated_at"
            description: "변경일시"
          - name: "updated_by"
            description: "변경 주체"
          - name: "deleted_by"
            description: "삭제 주체"
          - name: "deleted_at"
            description: "삭제일시"
          - name: "dw_load_dt"
            description: "DW 적재 일시"
