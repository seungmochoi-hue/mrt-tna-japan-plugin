version: 2

sources:
  - name: "localstay"
    database: "mrtdata"
    schema: "edw"
    tables:
      - name: "reservation"
        identifier: "DW_MRT_LOCALSTAY_RESERVATION"
        description: "로컬스테이 예약 마스터"
        columns:
          - name: "reservation_id"
            description: "일련번호(auto increment)"
          - name: "reservation_no"
            description: "마리트 예약 번호. 체크아웃 생성"
          - name: "gds_booking_no"
            description: "gds 예약 번호. gds 예약 후 생성"
          - name: "check_in_date"
            description: "체크인 일자"
          - name: "check_out_date"
            description: "체크아웃 일자"
          - name: "total_origin_amount"
            description: "(총) 원본 금액. 원가"
          - name: "total_paid_amount"
            description: "(총) 결제 금액. 여행자가 지불한 금액"
          - name: "total_refund_amount"
            description: "(총) 환불 금액. 부분환불일 경우, total_paid_amount 와 차이 발생"
          - name: "total_onda_refund_amount"
            description: "(총) 환불 금액. 온다에 전송된 환불금액"
          - name: "reservation_status_type"
            description: "마리트 주문상태"
          - name: "reservation_user_name"
            description: "예약자명(개인정보 - null 처리)"
          - name: "reservation_requested_at"
            description: "예약 요청일시"
          - name: "reservation_created_at"
            description: "예약 확정일시"
          - name: "reservation_cancelled_at"
            description: "예약 취소일시"
          - name: "reservation_cancelled_reason"
            description: "예약 취소 사유"
          - name: "created_at"
            description: "생성일시"
          - name: "created_by"
            description: "생성주체"
          - name: "updated_at"
            description: "수정일시"
          - name: "updated_by"
            description: "수정주체"
          - name: "deleted_at"
            description: "삭제일시"
          - name: "deleted_by"
            description: "삭제주체"
          - name: "dw_load_dt"
            description: "DW 적재 일시"
