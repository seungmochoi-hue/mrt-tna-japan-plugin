version: 2

sources:
  - name: "localstay"
    database: "mrtdata"
    schema: "edw"
    tables:
      - name: "reservation_item"
        identifier: "DW_MRT_LOCALSTAY_RESERVATION_ITEM"
        description: "로컬스테이 예약 객실"
        columns:
          - name: "reservation_item_id"
            description: "일련번호(auto increment)"
          - name: "reservation_id"
            description: "reservation 일련번호(reservation.reservation_id)"
          - name: "lodging_id"
            description: "숙소ID(gid)"
          - name: "lodging_name"
            description: "숙소명"
          - name: "gds_pid"
            description: "온다 GDS_PID"
          - name: "room_type_id"
            description: "온다 roomtype ID"
          - name: "room_type_name"
            description: "온다 roomtype명(객실명)"
          - name: "rate_plan_id"
            description: "온다 rateplan ID"
          - name: "vendor_booking_no"
            description: "공급사 예약번호"
          - name: "guest_name"
            description: "투숙자명(개인정보 - null 처리)"
          - name: "adult_count"
            description: "예약한 객실의 표준 성인수"
          - name: "book_adult_count"
            description: "예약 성인수"
          - name: "origin_amount"
            description: "원본 금액"
          - name: "paid_amount"
            description: "결제 금액. 여행자가 지불한 금액"
          - name: "refund_amount"
            description: "환불 금액. 부분환불일 경우, paid_amount 와 차이 발생"
          - name: "created_at"
            description: "생성일시"
          - name: "created_by"
            description: "생성주체"
          - name: "updated_at"
            description: "수정일시"
          - name: "updated_by"
            description: "수정주체"
          - name: "deleted_at"
            description: "삭제일시"
          - name: "deleted_by"
            description: "삭제주체"
          - name: "dw_load_dt"
            description: "DW 적재 일시"
