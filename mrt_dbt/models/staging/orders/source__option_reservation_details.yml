version: 2

sources:
  - name: "orders"
    database: "mrtdata"
    schema: "edw"
    tables:
      - name: "option_reservation_details"
        identifier: "DW_MRT_ORDERS_OPTION_RESERVATION_DETAILS"
        description: |
          3.0 옵션 예약 상세 원천 테이블. 옵션 예약별 상세 속성(사용 단위/추가 메타데이터) 제공함. 옵션 기준 세부 집계와 상세 속성 보강 조인에 사용함.
        columns:
          - name: "id"
            description: "id"
          - name: "option_reservation_id"
            description: "옵션예약 id"
          - name: "pnr_no"
            description: "pnr no"
          - name: "flight_pay_tl"
            description: "항공 결제 만료시간"
          - name: "pnr_text"
            description: "pnr text"
          - name: "is_flight_held"
            description: "항공 점유 여부"
          - name: "flight_reservation_no"
            description: "항공 예약 번호"
          - name: "flight_ticket_no"
            description: "항공 티켓 번호"
          - name: "progress"
            description: "운영 참고"
          - name: "is_accommodation_stock_held"
            description: "숙소 재고 점유 여부"
          - name: "landing_url"
            description: "상품랜딩 url"
          - name: "created_at"
            description: "생성 시간"
          - name: "created_by"
            description: "created by userId"
          - name: "deleted_at"
            description: "삭제 시간"
          - name: "updated_at"
            description: "수정 시간"
          - name: "updated_by"
            description: "updated by userId"
          - name: "dw_load_dt"
            description: "DW 적재 일시"
