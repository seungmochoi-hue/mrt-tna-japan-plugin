version: 2

sources:
  - name: "orders"
    database: "mrtdata"
    schema: "edw"
    tables:
      - name: "reservations"
        identifier: "DW_MRT_ORDERS_RESERVATIONS"
        description: |
          3.0 주문(orders) 도메인의 예약(Reservation) 원천 테이블. 예약번호(reservation_no) 단위로 예약 상태/상품/파트너/금액(판매가, 총수수료 등) 정보 기록함.
          주요 활용은 매출/손익 마트에서 3.0 예약 기준값 조인에 사용하며, 비항공 모먼트스튜디오 링크 점검 쿼리에서 예약번호·상태·상품 식별 기준을 보강하는 데 사용함.
        columns:
          - name: "id"
            description: "예약 ID"
          - name: "created_at"
            description: "생성일시"
          - name: "created_by"
            description: "생성자"
          - name: "deleted_at"
            description: "삭제일시"
