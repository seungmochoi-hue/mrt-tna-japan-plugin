      description: 패키지 옵션 ID
    - name: linkage_sub_key
      description: 연동 보조키
    - name: partner_id
      description: 파트너 ID
    - name: package_component_reservation_group_id
      description: 패키지 구성상품 예약 그룹 ID
    - name: pnr_sequence_no
      description: PNR 일련번호
    - name: gds_reservation_id
