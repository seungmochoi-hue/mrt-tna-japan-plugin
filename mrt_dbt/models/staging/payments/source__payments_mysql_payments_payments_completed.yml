version: 2

sources:
  - name: "payments_stream"
    database: "mrtdata"
    schema: "edw_stream"
    tables:
      - name: "payments_mysql_payments_payments_completed"
        identifier: "payments_mysql_payments_payments_completed"
        description: |
          결제 도메인 CDC 원천(완료 결제 트랜잭션). `created_at`, `order_no`, `payment_gateway`, `PG_authorized_amount`를 포함하며, PAYPAL/해외간편결제 조회에서 결제수단별 승인 금액·건수 대사에 사용함.
        columns:
          - name: "id"
            description: "ID"
          - name: "order_payment_id"
            description: "order_payment id"
          - name: "pay_router_id"
            description: "pay_router Id (결제혜택이 적용된 경우에만)"
          - name: "payments_ongoing_id"
            description: "payment_ongoing id"
          - name: "order_no"
            description: "주문번호"
          - name: "user_id"
            description: "사용자 아이디"
          - name: "external_tid"
            description: "PG사에서 발급해주는 결제 고유 번호"
          - name: "external_tx_history_id"
            description: "PG사에서 발급해주는 요청 고유 번호"
          - name: "platform"
            description: "사용자가 접속한 플랫폼"
          - name: "payment_type"
            description: "결제 타입 (PAYMENT, REFUND)"
          - name: "payment_status"
            description: "결제 상태"
          - name: "order_price_amount"
            description: "결제 금액"
          - name: "order_price_currency_code"
            description: "통화 (KRW)"
          - name: "payment_gateway"
            description: "PG사"
          - name: "PG_request_amount"
            description: "PG사에 결제 요청한 금액"
          - name: "PG_authorized_amount"
            description: "PG사에서 결제 승인한 금액"
          - name: "PG_request_currency_code"
            description: "PG사에 결제 요청한 금액의 통화 (KRW)"
          - name: "payment_method"
            description: "결제 수단"
          - name: "payment_installment_plan"
            description: "할부정보"
          - name: "client_id"
            description: "마리트 PG 에서 발급하는 이용 서비스의 clientId"
          - name: "payment_tx_parent_id"
            description: "마리트 PG 에서 발급하는 txId"
          - name: "payment_tx_id"
            description: "마리트 PG 에서 발급하는 txId"
          - name: "created_at"
            description: "생성일시"
          - name: "created_by"
            description: "생성자"
          - name: "updated_at"
            description: "수정일시"
          - name: "updated_by"
            description: "수정자"
          - name: "deleted_at"
            description: "삭제일시"
          - name: "_key"
            description: "Key"
          - name: "parent_authz_payment_id"
            description: "환불타입만 존재 환불시 사용한 부모 승인 객체"
          - name: "card_code"
            description: "결제한 카드 상세 정보 (LOTTE, WOORI etc)"
          - name: "authorized_at"
            description: "결제 승인 일자"
          - name: "client_type"
            description: "클라이언트 타입(3.0주문, 항공)"
          - name: "standard_date"
            description: "환율 거래된 기준 날짜 (KST YYYY-MM-DD 형식)"
          - name: "standard_exchange_rate"
            description: "기준 환율 (예: 1350.00)"
          - name: "PG_authorized_cash_amount"
            description: "pg에 승인된 현금 금액"
          - name: "cash_receipt_requested"
            description: "현금영수증 발급 요청 여부"
          - name: "cash_receipt_issue_type"
            description: "여행자 발급 대상 타입 (PERSONAL_INCOME_TAX, BIZ_EXPENSE_PROOF)"
          - name: "cash_receipt_target_value"
            description: "발급 대상 값 (전화번호 또는 사업자등록번호)"
          - name: "payment_detail_method"
            description: "결제 상세 수단"
