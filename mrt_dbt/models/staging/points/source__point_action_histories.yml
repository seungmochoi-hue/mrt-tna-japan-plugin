version: 2

sources:
  - name: "points"
    database: "mrtdata"
    schema: "edw"
    tables:
      - name: "point_action_histories"
        identifier: "DW_MRT_POINT_POINT_ACTION_HISTORIES"
        description: "포인트 액션 이력"
        columns:
          - name: "id"
            description: "PK"
          - name: "point_id"
            description: "points 테이블의 PK"
          - name: "user_id"
            description: "사용자 ID"
          - name: "action_type"
            description: "액션 타입(SAVE_UP, USE_ORDER, USE_ORDER_LEGACY, CANCEL_ORDER, CANCEL_ORDER_LEGACY, PARTIAL_ORDER_CANCEL, PARTIAL_ORDER_CANCEL_LEGACY, RETRIEVE, EXPIRE)"
          - name: "action_type_related_id"
            description: "Deprecated, action_type_reference_key로 변경"
          - name: "action_type_reference_key"
            description: |
              포인트 사용과 관련됐다면 주문번호
              구매 적립과 관련됐다면 예약번호
              action_type과 관련된 참조키 역할
          - name: "action_reason_msg"
            description: "기타 메세지"
          - name: "before_action_amount"
            description: "액션 진행 전 존재하는 포인트"
          - name: "action_amount"
            description: "액션(차감,적립 등) 요청 포인트"
          - name: "after_action_amount"
            description: "액션 후 남은 포인트"
          - name: "created_at"
            description: "생성 일자"
          - name: "created_by"
            description: "생성자"
          - name: "updated_at"
            description: "수정 일자"
          - name: "updated_by"
            description: "수정자"
          - name: "deleted_at"
            description: "삭제 일자"
          - name: "order_no"
            description: "주문 No"
          - name: "product_title"
            description: "주문 title"
          - name: "user_grade"
            description: "유저 등급"
          - name: "dw_load_dt"
            description: "DW 적재 일시"
          - name: "template_id"
            description: "Template ID"
