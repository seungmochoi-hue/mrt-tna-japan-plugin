version: 2

sources:
  - name: "points"
    database: "mrtdata"
    schema: "edw"
    tables:
      - name: "point_templates"
        identifier: "DW_MRT_POINT_POINT_TEMPLATES"
        description: "포인트 템플릿"
        columns:
          - name: "id"
            description: "포인트 템플릿 ID"
          - name: "template_name"
            description: "포인트 템플릿 명"
          - name: "point_category"
            description: "포인트 지급 사유(구매 적립, 이벤트 적립 등)"
          - name: "amount"
            description: "포인트 금액, 적립 금액이 고정인 경우에 사용"
          - name: "is_publishable_limit_amount"
            description: "발행 금액 제한(사용 : 1/불가 : 0)"
          - name: "is_publishable_limit_count"
            description: "발행 갯수 제한(사용 : 1/불가 : 0)"
          - name: "max_publishable_amount"
            description: "최대 발행 가능 금액, 발행 금액 제한 사용 시"
          - name: "max_publishable_count"
            description: "최대 발행 가능 갯수, 발행 갯수 제한 사용 시"
          - name: "publish_start_date"
            description: "포인트 지급 가능 시작 일시"
          - name: "publish_expire_date"
            description: "포인트 지급 가능 만료 일시"
          - name: "is_publishable"
            description: "포인트 발급 가능 여부(발급 : 1/ 불가 : 0)"
          - name: "is_usable"
            description: "포인트 사용 가능 여부(사용 : 1/불가 : 0)"
          - name: "expire_period_type"
            description: "포인트 사용 유효기간 설정 타입(일단위/기간 설정)"
          - name: "point_use_start_date"
            description: "포인트 지급 가능 시작 일시, expire_period_type가 기간 설정인 경우"
          - name: "point_use_expire_date"
            description: "포인트 지급 가능 만료 일시, expire_period_type가 기간 설정인 경우"
          - name: "expire_period"
            description: "포인트 지급 후 만료일, expire_period_type가 일단위 경우"
          - name: "point_save_up_type"
            description: "적립 방식(정액/정률)"
          - name: "is_cashback"
            description: "캐시백 가능 여부(가능 : 1/불가 : 0)"
          - name: "is_use_save_up_alarm"
            description: "적립 알림 사용 여부"
          - name: "app_push_notification_text"
            description: "앱푸시 템플릿"
          - name: "is_use_expire_alarm"
            description: "만료 알림 사용 여부"
          - name: "expire_alarm_days"
            description: "만료알림 기간 (n일전), 만료일 여러 개 등록 가능"
          - name: "is_repeatable"
            description: "포인트 중복 발급 가능 여부(가능 : 1/ 불가 : 0)"
          - name: "is_free"
            description: "포인트 무료, 유료 여부(무료 : 1/ 유료 : 0)"
          - name: "created_at"
            description: "생성 일시"
          - name: "created_by"
            description: "생성자"
          - name: "updated_at"
            description: "수정 일시"
          - name: "updated_by"
            description: "수정자"
          - name: "deleted_at"
            description: "삭제 일시"
          - name: "is_draft"
            description: "템플릿 임시여부(임시 : 1/승인완료 : 0)"
          - name: "point_type"
            description: "일반적립,구매적립"
          - name: "dw_load_dt"
            description: "DW 적재 일시"
