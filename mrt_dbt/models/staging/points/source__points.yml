version: 2

sources:
  - name: "points"
    database: "mrtdata"
    schema: "edw"
    tables:
      - name: "points"
        identifier: "DW_MRT_POINT_POINTS"
        description: "포인트 마스터"
        columns:
          - name: "id"
            description: "포인트 ID"
          - name: "template_id"
            description: "포인트 템플릿 ID"
          - name: "user_id"
            description: "사용자 ID"
          - name: "user_name"
            description: "사용자 이름 (사용 x)(개인정보 - null 처리)"
          - name: "user_email"
            description: "사용자 이메일 (사용 x)(개인정보 - null 처리)"
          - name: "initial_amount"
            description: "최초 적립 금액"
          - name: "remain_amount"
            description: "차감 후 남은 금액"
          - name: "expire_date"
            description: "해당 포인트 스택이 만료되는 날짜"
          - name: "expire_reason"
            description: "포인트 만료 사유"
          - name: "point_status"
            description: "포인트 상태(ACTIVE, INACTIVE, EXHAUST, EXPIRE)"
          - name: "is_free"
            description: "포인트 무료, 유료 여부(무료 : 1/ 유료 : 0)"
          - name: "created_at"
            description: "생성 일시"
          - name: "created_by"
            description: "생성자"
          - name: "updated_at"
            description: "수정 일시"
          - name: "updated_by"
            description: "수정자"
          - name: "deleted_at"
            description: "삭제 일시"
          - name: "dw_load_dt"
            description: "DW 적재 일시"
