version: 2

sources:
  - name: settles
    database: mrtdata
    schema: edw
    tables:
      - name: accounting_event_histories
        identifier: DW_MRT_SETTLES_ACCOUNTING_EVENT_HISTORIES
        description: |
          회계 이벤트 히스토리 원천. 예약-정산 흐름의 이벤트 이력을 제공하며, 3.0 정산테이블 검증 쿼리에서 이벤트 시점 정합성 검증에 사용함.
        columns:
          - name: id
            description: "ID"
          - name: event
            description: "로깅 시점에 대한 설명"
          - name: reservation_id
            description: "예약 아이디"
          - name: guide_settle_type
            description: "가이드 정산 유형, internal, external"
          - name: commission_type
            description: "매출 인식 유형, commission, total"
          - name: payment_id
            description: "payments 테이블 id"
          - name: refund_id
            description: "refuneds 테이블 id"
          - name: remittance_id
            description: "guide_remittances 테이블 id"
          - name: coupon_code_id
            description: "promotion_coupon_codes 테이블 id"
          - name: user_point_id
            description: "user_points 테이블 id"
          - name: guide_profit_id
            description: "guide_profits 테이블 id"
          - name: price_adjustment_id
            description: "price_adjustments 테이블 id"
          - name: guide_profit_type
            description: "guide_profit type, 예약 정산, 취소 정산"
          - name: reservation_price_amount
            description: "상품 원가 (reservations :: price_amount)"
          - name: reservation_price_currency_code
            description: "상품 통화 (reservations :: price_currency_code)"
          - name: reservation_price_amount_won
            description: "상품 원가를 해당 일의 환율 적용하여 원화로 환산한 금액"
          - name: reservation_commission_rate
            description: "coalesce(r.offer_commission_rate, r.guide_commission_rate)"
          - name: coupon_price_amount
            description: "쿠폰 적용 가격. 취소(환급)된 경우 마이너스로 입력"
          - name: coupon_price_currency_code
            description: "promotion_coupons :: price_currency_code"
          - name: paid_price_amount
            description: "payments :: price_amount 취소(환급)된 경우 마이너스로 입력"
          - name: paid_price_currency_code
            description: "payments :: price_currency_code"
          - name: point_amount
            description: "user_points :: point   취소(환급)된 경우 마이너스로 입력"
          - name: adjustment_type
            description: "price_adjustments :: 조정 유형"
          - name: adjustment_guide_price_amount
            description: "price_adjustments :: profit_price_amount"
          - name: adjustment_guide_price_amount_currency_code
            description: "price_adjustments :: profit_price_currency_code"
          - name: adjustment_mrt_price_amount
            description: "price_adjustments :: commission_price_amount"
          - name: adjustment_mrt_price_amount_currency_code
            description: "price_adjustments :: commission_price_currency_code"
          - name: adjustment_reason
            description: "price_adjustments :: reason"
          - name: guide_profit
            description: "결제총액 * reservation_commission_rate  (가이드에게 가는 수수료)  취소된 경우 그만큼을 마이너스로 기록"
          - name: mrt_profit
            description: "1 - 결제총액 * reservation_commission_rate  (마리트에게 가는 수수료)  취소된 경우 그만큼을 마이너스로 기록"
          - name: remitted_price_amount
            description: "정산 생성 금액"
          - name: remitted_price_currency_code
            description: "정산 완료 금액"
          - name: created_at
            description: "생성일"
          - name: created_by
            description: "생성자"
          - name: updated_at
            description: "수정일"
          - name: updated_by
            description: "수정자"
          - name: deleted_at
            description: "삭제일"
          - name: dw_load_dt
            description: "DW 적재 일시"
          - name: mrt_coupon_price_amount
            description: "마리트 쿠폰 금액"
          - name: partner_coupon_price_amount
            description: "파트너 쿠폰 금액"
          - name: instant_discount_amount
            description: "즉시 할인 금액"
          - name: mrt_instant_discount_amount
            description: "마리트 즉시 할인 금액"
          - name: affiliate_instant_discount_amount
            description: "제휴사 즉시 할인 금액"
