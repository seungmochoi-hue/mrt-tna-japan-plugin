        identifier: DW_MRT_SETTLES_CATEGORY_COMMISSION
        description: |
          카테고리 수수료율 기준 원천. 카테고리/상품군 단위 기본 수수료율을 제공하며, 카테고리 수수료율 조회 쿼리에서 기준표로 사용함.
        columns:
