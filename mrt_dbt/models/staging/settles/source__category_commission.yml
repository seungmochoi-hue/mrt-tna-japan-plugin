            description: "삭제일"
          - name: created_by
            description: "생성자"
          - name: updated_by
            description: "수정자"
          - name: snapshot_date
            description: "스냅샷 날짜"
          - name: commission_group_code
            description: "수수료 그룹 코드"
          - name: commission_group_name
            description: "수수료 그룹 이름"
          - name: category_code
            description: "카테고리 코드"
