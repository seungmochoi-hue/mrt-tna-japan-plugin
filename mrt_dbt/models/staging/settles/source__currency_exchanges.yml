version: 2

sources:
  - name: settles
    database: mrtdata
    schema: edw
    tables:
      - name: currency_exchanges
        identifier: DW_MRT_SETTLES_CURRENCY_EXCHANGES
        description: |
          정산 환율 기준 원천. 통화별 기준일 환율을 제공하며, 외화 정산 조회 쿼리에서 원화 환산 검증에 사용함.
        columns:
          - name: id
            description: "ID"
          - name: created_at
            description: "생성일"
          - name: updated_at
            description: "수정일"
          - name: deleted_at
            description: "삭제일"
          - name: standard_date
            description: "표준일"
          - name: standard_time_type
            description: "표준 시간 유형"
          - name: from_currency
            description: "변환 전 통화"
          - name: to_currency
            description: "변환 후 통화"
          - name: standard_exchange_rate
            description: "표준 환율"
          - name: sale_exchange_rate
            description: "판매 환율"
          - name: purchase_exchange_rate
            description: "구매 환율"
          - name: term_end_exchange_rate
            description: "기간 환율"
          - name: month_average_exchange_rate
            description: "월 평균 환율"
          - name: accumulate_average_exchange_rate
            description: "누적 평균 환율"
          - name: dw_load_dt
            description: "DW 적재 일시"
