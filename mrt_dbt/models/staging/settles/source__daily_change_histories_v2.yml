version: 2

sources:
  - name: settles
    database: mrtdata
    schema: edw
    tables:
      - name: daily_change_histories_v2
        identifier: DW_MRT_SETTLES_DAILY_CHANGE_HISTORIES_V2
        description: |
          일마감 변경 이력(SETTLES V2) 원천. 예약/정산 데이터의 변경 추적 로그를 제공하며, 파트너 정산 원예약 대체 금액 산정 쿼리에서 변경 전후 대체 로직 검증에 사용함.
        columns:
          - name: id
            description: "id"
          - name: history_type
            description: "히스토리 타입"
          - name: changed_at
            description: "히스토리 실제 발생 시간"
          - name: change_reason
            description: "변경 사유"
          - name: pkg_order_id
            description: "패키지 주문 아이디"
          - name: pkg_reservation_id
            description: "패키지 예약 아이디"
          - name: pkg_reservation_refund_id
            description: "패키지 예약 환불 아이디"
