            description: "패키지 옵션 예약 아이디"
          - name: pkg_option_reservation_refund_id
            description: "패키지 옵션 예약 환불 아이디"
          - name: pkg_option_reservation_status
            description: "패키지 옵션 예약 상태"
          - name: pkg_union_product_id
            description: "패키지 gid"
          - name: pkg_option_id
            description: "패키지 옵션 아이디"
          - name: pkg_option_title
            description: "패키지 옵션 타이틀"
