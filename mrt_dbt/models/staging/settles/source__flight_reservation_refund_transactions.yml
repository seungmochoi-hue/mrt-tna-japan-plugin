version: 2

sources:
  - name: settles
    database: mrtdata
    schema: edw
    tables:
      - name: flight_reservation_refund_transactions
        identifier: DW_MRT_SETTLES_FLIGHT_RESERVATION_REFUND_TRANSACTIONS
        description: |
          항공 예약 환불 트랜잭션 원천. 예약 단위 환불 금액/수수료를 제공하며, 항공 인디비 원천 쿼리에서 환불 차감 산식에 사용함.
        columns:
          - name: id
            description: "pk"
          - name: created_at
            description: "생성 일시"
          - name: created_by
            description: "생성자"
          - name: deleted_at
            description: "삭제 일시"
          - name: updated_at
            description: "수정 일시"
          - name: updated_by
            description: "수정자"
          - name: canceled_at
            description: "취소 일시"
          - name: occurred_at
            description: "발생시점"
          - name: refund_type
            description: "환불 구분"
          - name: reservation_id
            description: "예약 ID"
          - name: reservation_refund_id
            description: "예약 환불 ID"
          - name: payment_id
            description: "payment 도메인 결제 ID"
          - name: partner_id
            description: "파트너 ID"
          - name: refund_amount
            description: "환불 금액"
          - name: refund_pg_amount
            description: "PG 환불 금액"
          - name: refund_point_amount
            description: "포인트 환불 금액"
          - name: refund_instant_discount_amount
            description: "즉시할인 환불 금액"
          - name: refund_coupon_discount_amount
            description: "쿠폰 환불 금액"
          - name: refund_margin_discount_amount
            description: "마진 할인 환불 금액"
          - name: total_cancel_commission
            description: "총 취소 수수료"
          - name: mrt_cancel_commission
            description: "마리트 취소 수수료"
          - name: partner_cancel_commission
            description: "파트너 취소 수수료"
          - name: dw_load_dt
            description: "DW 적재 일시"
