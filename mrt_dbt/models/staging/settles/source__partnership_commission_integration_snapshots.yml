version: 2

sources:
  - name: settles
    database: mrtdata
    schema: edw
    tables:
      - name: partnership_commission_integration_snapshots
        identifier: DW_MRT_SETTLEMENTS_PARTNERSHIP_COMMISSION_INTEGRATION_SNAPSHOTS
        description: |
          제휴 수수료 통합 스냅샷 원천. 제휴사 수수료 정책의 통합 시점 이력을 제공하며, 결제일 기준 패키지 결제(대체) 전표 대사 쿼리에서 정책 적용값 검증에 사용함.
        columns:
          - name: id
            description: "ID"
          - name: created_at
            description: "생성일"
          - name: created_by
            description: "생성자"
          - name: updated_at
            description: "수정일"
          - name: updated_by
            description: "수정자"
          - name: deleted_at
            description: "삭제일"
          - name: partnership_commission_policy_id
            description: "제휴사 수수료 정책 ID"
          - name: partnership_additional_commission_policy_id
            description: "제휴사 추가 수수료 정책 ID"
          - name: commission_rate
            description: "정률 수수료율"
          - name: fixed_commission
            description: "정액 수수료액"
          - name: dw_load_dt
            description: "DW 적재 일시"
