version: 2

sources:
  - name: settles
    database: mrtdata
    schema: edw
    tables:
      - name: partnership_commission_policies
        identifier: DW_MRT_SETTLES_PARTNERSHIP_COMMISSION_POLICIES
        description: |
          제휴 수수료 정책 원천. 제휴 코드별 수수료율/적용기간 정책을 제공하며, 마케팅 파트너 수수료율 검증 쿼리에서 정책 매칭 기준으로 사용함.
        columns:
          - name: id
            description: "ID"
          - name: created_at
            description: "생성일"
          - name: created_by
            description: "생성자"
          - name: updated_at
            description: "수정일"
          - name: updated_by
            description: "수정자"
          - name: deleted_at
            description: "삭제일"
          - name: partner_type
            description: "파트너 구분"
          - name: snapshot_started_at
            description: "스냅샷 시작시점(포함)"
          - name: snapshot_ended_at
            description: "스냅샷 종료시점(제외)"
          - name: gid
            description: "GID"
          - name: partner_id
            description: "파트너 ID"
          - name: first_depth_category
            description: "1차 카테고리"
          - name: second_depth_category
            description: "2차 카테고리"
          - name: third_depth_category
            description: "3차 카테고리"
          - name: commission_calculation_type
            description: "수수료 계산 방식"
          - name: commission_rate
            description: "기본 수수료율"
          - name: fixed_commission
            description: "기본 수수료액"
          - name: dw_load_dt
            description: "DW 적재 일시"
