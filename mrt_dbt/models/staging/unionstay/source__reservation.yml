version: 2

sources:
  - name: "unionstay"
    database: "mrtdata"
    schema: "edw"
    tables:
      - name: "reservation"
        identifier: "DW_MRT_STAY_RESERVATION"
        description: "Unionstay 예약 마스터"
        columns:
          - name: "reservation_id"
            description: "PK"
          - name: "reservation_status"
            description: "예약 상태 (enum으로 정의)"
          - name: "error_code"
            description: "예약 오류 코드"
          - name: "provider_type"
