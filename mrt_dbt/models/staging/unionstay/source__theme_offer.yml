      description: 체크아웃 종료 일자
    - name: created_at
      description: 생성일시
    - name: created_by
      description: 생성자
    - name: updated_at
      description: 수정일시
    - name: updated_by
      description: 수정자
    - name: deleted_at
      description: 삭제일시
    - name: deleted_by
      description: 삭제자
    - name: dw_load_dt
      description: DW 적재 일시
